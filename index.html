  --ko-v9-muted:#615D6E !important;
  --ko-v9-muted2:#9A95A6 !important;
  --ko-v9-fume:#4C4A57 !important;
  --ko-v9-fume2:#33313D !important;
  --ko-v9-fume3:#6E6B7A !important;
  --ko-v9-mint:#CFF4E6 !important;

  --ko-v9-ok-bg:#E7F3EE !important;

  --ko-t-intercity:#5C7A52 !important; /* tahsis (VIP) - yeşil */

function TakvimTab({ T, tip, todos, setTodos, ledger, setLedger }) {

    const [showLedgerForm, setShowLedgerForm] = useState(false);
    const emptyLedgerForm = { ltype: 'in', person: '', amount: '', note: '', due: '' };
    const [ledgerForm, setLedgerForm] = useState(emptyLedgerForm);
    const [editLedgerId, setEditLedgerId] = useState(null);
    const [ledgerAction, setLedgerAction] = useState(null);
    const [showAudit, setShowAudit] = useState(false);

    const AYLAR_LONG = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    const GUNLER = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
    const TODO_CATEGORIES = [
        { id: 'is', name: 'İş', color: '#1C1C1E' },
        { id: 'odeme', name: 'Ödeme', color: '#636366' },
        { id: 'arac', name: 'Araç', color: '#636366' },
        { id: 'kisisel', name: 'Kişisel', color: '#1C1C1E' },
        { id: 'saglik', name: 'Sağlık', color: '#1C1C1E' },
        { id: 'acil', name: 'Acil', color: '#4F6B45' }
    ];
    const REPEAT_OPTIONS = [
        { id: 'none', name: 'Tek sefer' },
        { id: 'daily', name: 'Her gün' },
        { id: 'weekly', name: 'Her hafta' },
        { id: 'biweekly', name: '2 haftada bir' },
        { id: 'monthly', name: 'Her ay' },
        { id: 'yearly', name: 'Her yıl' }
    ];

    const today = new Date();
    const todayKey = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
    const tomorrowKey = tomorrow.getFullYear() + '-' + String(tomorrow.getMonth()+1).padStart(2,'0') + '-' + String(tomorrow.getDate()).padStart(2,'0');
    const fmtKey = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const addRepeatDate = (date, repeat) => {
        const d = new Date(date);
        if (repeat === 'daily') d.setDate(d.getDate() + 1);
        else if (repeat === 'weekly') d.setDate(d.getDate() + 7);
        else if (repeat === 'biweekly') d.setDate(d.getDate() + 14);
        else if (repeat === 'monthly') d.setMonth(d.getMonth() + 1);
        else if (repeat === 'yearly') d.setFullYear(d.getFullYear() + 1);
        return d;
    };
    const repeatLabel = id => (REPEAT_OPTIONS.find(x => x.id === id) || REPEAT_OPTIONS[0]).name;
    const categoryMeta = id => TODO_CATEGORIES.find(x => x.id === id) || TODO_CATEGORIES[0];
    const vehicleName = t => {
        const v = VEHS.find(x => x.id === (t && t.vehicle));
        return v ? v.n : ((t && t.vehicle) ? String(t.vehicle) : 'Vito');
    };
    const todoCalendarIcon = t => {
        if ((t && t.category) === 'odeme') return '💰';
        if ((t && t.category) === 'acil' || (t && t.priority) === 'high') return '🔴';
        return '';
    };
    const todoCalendarTitle = t => [todoCalendarIcon(t), t && t.title].filter(Boolean).join(' ');
    const transferPanelTitle = t => [transferCalendarIcon(t), transferCalendarRoute(t), vehicleName(t)].filter(Boolean).join(' ');

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month+1, 0);
    const startWeekday = (firstDay.getDay() + 6) % 7; // Mon=0
    const daysInMonth = lastDay.getDate();
    const prevMonthDays = new Date(year, month, 0).getDate();

    // Build cells
    const cells = [];
    for (let i = startWeekday - 1; i >= 0; i--) {
        const d = prevMonthDays - i;
        const dt = new Date(year, month-1, d);
        cells.push({ day: d, date: dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'), other: true });
    }
    for (let d = 1; d <= daysInMonth; d++) {
        cells.push({ day: d, date: year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'), other: false });
    }
    const remain = (7 - cells.length % 7) % 7;
    for (let d = 1; d <= remain; d++) {
        const dt = new Date(year, month+1, d);
        cells.push({ day: d, date: dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'), other: true });
    }

    // Get items for a date (transfers + todos + events)
    const getDateItems = (dateKey) => {
        const transfers = (T || []).filter(x => x.date === dateKey && x.status !== 'iptal').map(t => ({
            type: 'transfer',
            id: 't_' + t.id,
            title: transferPanelTitle(t),
            sub: ['Araç: ' + vehicleName(t), t.plate ? '🚐 ' + t.plate : '', t.givenBy || '', t.assignedTo && t.assignedTo !== t.givenBy ? '· ' + t.assignedTo : '', (t.passengers && t.passengers[0] && t.passengers[0].name) ? '· ' + t.passengers[0].name : ''].filter(Boolean).join(' '),
            time: t.time || '',
            done: transferLooksDone(t),
            vehicle: vehicleName(t),
            origData: t

        const tds = (todos || []).filter(x => x.date === dateKey && x.kind !== 'event').map(t => ({
            type: 'todo',
            id: 'td_' + t.id,
            title: todoCalendarTitle(t),
            sub: t.notes || '',
            time: t.time || '',
            done: !!t.done,
            category: t.category || 'is',
            color: t.color || categoryMeta(t.category).color,
            repeat: t.repeat || 'none',
            origData: t
        }));
        const evs = (todos || []).filter(x => x.eventDate === dateKey && x.kind === 'event').map(t => ({
            type: 'event',
            id: 'ev_' + t.id,
            title: todoCalendarTitle(t),
            sub: t.notes || '',
            time: t.time || '',
            done: false,
            category: t.category || 'is',
            color: t.color || categoryMeta(t.category).color,
            repeat: t.repeat || 'none',
            origData: t
        }));
        return [...transfers, ...tds, ...evs].sort((a,b) => {
            if (!a.time && !b.time) return 0;
            if (!a.time) return 1;
            if (!b.time) return -1;
            return a.time.localeCompare(b.time);
        });
    };

    // Date counts for cells

    (todos || []).forEach(t => { if (t.date) dateCounts[t.date] = (dateCounts[t.date]||0)+1; });

    const goPrev = () => setCurrentDate(new Date(year, month-1, 1));
    const goNext = () => setCurrentDate(new Date(year, month+1, 1));

    const toggleTodoDone = (id) => {

    };
    const openNewTodo = dateKey => {
        setSelectedDate(dateKey);
        setEditTodoId(null);
        setFormData({ ...emptyTodoForm, date: dateKey, color: TODO_CATEGORIES[0].color });
        setShowForm(true);
    };
    const editTodo = item => {
        const t = item.origData;
        setEditTodoId(t.id);
        setSelectedDate(t.date || t.eventDate || selectedDate);
        setFormData({
            ...emptyTodoForm,
            type: t.kind === 'event' ? 'event' : (t.type || 'todo'),
            title: t.title || '',
            time: t.time || '',
            notes: t.notes || '',
            priority: t.priority || 'none',
            category: t.category || 'is',
            color: t.color || categoryMeta(t.category).color,
            repeat: t.repeat || 'none',
            endDate: t.endDate || '',
            date: t.date || t.eventDate || selectedDate
        });
        setShowForm(true);
    };

    const deleteTodo = (id) => {
        if (!window.confirm('Bu kaydı silmek istiyor musun?')) return;
        setTodos(prev => prev.filter(t => t.id !== id));
        tip('Silindi');
    };

    const ledgerMovements = l => Array.isArray(l.movements) ? l.movements : [];
    const ledgerIncrease = l => ledgerMovements(l).filter(m => m.kind === 'increase').reduce((s,m) => s + moneyValue(m.amount), 0);
    const ledgerPaid = l => moneyValue(l.paidAmount) + ledgerMovements(l).filter(m => m.kind === 'payment').reduce((s,m) => s + moneyValue(m.amount), 0);
    const ledgerTotal = l => moneyValue(l.amount) + ledgerIncrease(l);
    const ledgerRemaining = l => Math.max(0, ledgerTotal(l) - ledgerPaid(l));
    const ledgerIsSettled = l => !!l.settled || ledgerRemaining(l) <= 0;
    const toggleLedgerSettled = (id) => {

            note: l.note || '',
            due: l.due || ''
        });
        setShowLedgerForm(true);

    const openLedgerAction = (l, kind) => {

            id: editTodoId || Date.now(),

            repeat: formData.repeat,

        };
        if (formData.type === 'event') baseTodo.eventDate = baseDate;
        if (editTodoId) {

            setEditTodoId(null);
            tip('Güncellendi');
        } else if (formData.repeat !== 'none') {
            const end = new Date(formData.endDate);
            let cursor = new Date(baseDate);

            const rows = [];
            let guard = 0;

                const dateKey = fmtKey(cursor);

    const cellDots = (dateKey) => {
        const items = getDateItems(dateKey);
        const dots = [];
        const seenTypes = new Set();
        items.forEach(i => {
            if (i.type === 'transfer') {
                const tt = (i.origData && i.origData.transferType) || 'arrival';
                if (!seenTypes.has(tt)) { seenTypes.add(tt); dots.push(TYPE_DOT_COLORS[tt] || '#4C4A57'); }
            }
        });
        if (items.some(i => i.type === 'todo' || i.type === 'event')) dots.push('#9A95A6');
        return dots.slice(0,3);
    };

    const doneTodos = (todos || []).filter(t => !!t.done);

/* PDF_BALEN_OLMEZ_IMPORT - 110 kayıtlık eski PDF import verisi kullanıcı talebiyle
   kaldırıldı (donma/kasma sebebi olarak suçlandı). Sabit ismi referansları
   bozmamak için boş dizi olarak korundu. */

const pdfImportClean = v => nm(v).replace(/\s+/g, ' ').trim();
const pdfImportPassenger = t => pdfImportClean((((t || {}).passengers || [])[0] || {}).name || '');
const pdfImportSameTransfer = (a, b) => {
    if (!a || !b)
        return false;
    if (String(a.id || '') && String(a.id || '') === String(b.id || ''))
        return true;
    if (String(a.date || '') !== String(b.date || '') || String(a.time || '') !== String(b.time || ''))
        return false;
    const sameFirm = pdfImportClean(a.givenBy) === pdfImportClean(b.givenBy) && pdfImportClean(a.assignedTo) === pdfImportClean(b.assignedTo);
    if (!sameFirm)
        return false;
    const aName = pdfImportPassenger(a), bName = pdfImportPassenger(b);
    const sameName = !!(aName && bName && aName === bName);
    const sameRoute = pdfImportClean(a.pickup) === pdfImportClean(b.pickup) && pdfImportClean(a.dropoff) === pdfImportClean(b.dropoff);
    return sameName || sameRoute;
};

                                      .finally(function(){ setTimeout(function(){ cloudWritingRef.current = false; }, 300); });
                                }
                                return;

                            const data = snap.data() || {};
                            const payload = data.payload || data;
                            if(!payload || !Array.isArray(payload.t)) { cloudLoadedRef.current = true; return; }
                            const mergedPayload = mergeSnapshots(payload, localPayload || {}, deletedIds);
                            const localTs = snapshotStamp(localPayload);

                            const localCount = ((localPayload && localPayload.t) || []).length;

    }, [storageReady]);
    useEffect(() => { if (!storageReady) return; try {

           setTimeout içine taşındı. Önceden dedupeTransfers ve snapshot oluşturma her render'da 
           SENKRON çalışıyordu - büyük T listelerinde donma sebebi. Şimdi 500ms debounce sonrası
           tek seferde çalışıyor. */
        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);

            try {
                /* PERF: T zaten her setT'de dedupeTransfers'tan geçiyor; burada tekrar etmek

                const cleanTransfers = T;
                const snapshotCore = { t: cleanTransfers, a: agencies, ap: agencyPhones, dr: drivers, r: rates, ru: lastRateUpdate, ak: aracK, db: debts, adj: accountAdjustments, tk: todos, tl: tkLedger, del: readDeletedTransferIds(), v: 26 };
                /* PERF: Tüm snapshot'ı JSON.stringify ile imzalamak binlerce kayıtta donma/çökme yaratıyordu.

                const sigParts = [
                    cleanTransfers.length,
                    cleanTransfers.reduce((s, x) => s + (Date.parse(x.updatedAt || x.clientUpdatedAt || x.createdAt || '') || 0), 0),
                    agencies.length, drivers.length, aracK.length, debts.length, accountAdjustments.length, todos.length, tkLedger.length,
                    JSON.stringify(rates), lastRateUpdate || '', (readDeletedTransferIds() || []).length
                ];
                const saveSig = sigParts.join('|');
                if (saveSig === lastSaveSigRef.current)
                    return;
                lastSaveSigRef.current = saveSig;
                const nowIso = new Date().toISOString();
                const snapshot = { ...snapshotCore, date: nowIso, clientUpdatedAt: nowIso, _localWriteAt: nowIso };
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot)); } catch(e) { console.error('[LS] yazma hatası', e); }
                if(cloudEnabled() && authUser && !cloudWritingRef.current){
                    if (!cloudLoadedRef.current) {
                        console.warn('[CLOUD] Yazma engellendi - ilk bulut verisi bekleniyor');
