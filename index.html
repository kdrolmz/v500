<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Transfer Bilgileri">
<meta name="theme-color" content="#686868">
<title>Transfer Bilgileri</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   TRANSFER BİLGİLERİ — PREMIUM KURUMSAL TASARIM SİSTEMİ v2.0
   iPhone first · Desktop uyumlu · Tek dil, tek ton
   ═══════════════════════════════════════════════════════════════ */

:root{
  /* — yüzeyler — nude beyaz/krem ailesi — */
  --bg:#FAF6F3;           /* uygulama arka planı - soft nude */
  --bg-2:#F2ECE7;         /* koyu alternatif */
  --card:#FFFFFF;         /* ana kart - saf beyaz */
  --card-2:#FDFAF7;       /* ikincil kart */
  --surface:#F6F0EB;      /* input idle - soft nude */
  --surface-2:#F0E8E1;    /* modal içi */

  /* — çizgiler — */
  --line:#EFE3DB;
  --line-2:#E0D0C3;
  --line-strong:#C9B3A1;

  /* — metin — */
  --ink:#1F1715;          /* kahverengi tonlu siyah */
  --ink-2:#4A3A34;
  --ink-3:#7F6D63;
  --ink-4:#B0A196;

  /* — KIRMIZI MARKA — nude kırmızı + premium vurgular — */
  --brand:#9B1B30;        /* ana nude kırmızı */
  --brand-2:#7A1525;      /* koyu vurgu */
  --brand-3:#B02A3F;      /* açık canlı */
  --brand-soft:#F8E5E9;   /* çok soft arka plan */
  --brand-softer:#FDF0F2; /* en soft ton */
  --brand-bd:#E8B8C0;     /* soft border */

  --accent:#C89B7B;       /* nude şampanya */
  --accent-2:#B8855F;
  --accent-soft:#F7ECDF;

  /* — semantik (yumuşatıldı) — */
  --ok:#2D7A4A; --ok-bg:#E9F4EC; --ok-bd:#BDDBC5;
  --warn:#A57A1E; --warn-bg:#FAF1D9; --warn-bd:#E5CB92;
  --err:#9B1B30; --err-bg:#F8E5E9; --err-bd:#E8B8C0;
  --info:#3D6FA8; --info-bg:#EAF0F7; --info-bd:#BECCDD;

  /* — transfer tipi pasteller — nude aile ile uyumlu — */
  --t-arrival-bg:#EBF3ED;   --t-arrival-bd:#BFD5C5;
  --t-departure-bg:#EBEEF3; --t-departure-bd:#BEC8D5;
  --t-tour-bg:#F6ECD7;      --t-tour-bd:#D9C18E;
  --t-intercity-bg:#F0E8E1; --t-intercity-bd:#C9B3A1;

  /* — radius — */
  --r-xs:6px; --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:22px; --r-2xl:28px;

  /* — tipografi — */
  --sans:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;

  /* — safe-area — */
  --sa-t:env(safe-area-inset-top,0px);
  --sa-b:env(safe-area-inset-bottom,0px);
  --sa-l:env(safe-area-inset-left,0px);
  --sa-r:env(safe-area-inset-right,0px);

  /* — alt tab yüksekliği — */
  --tabbar-h:74px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;overflow:hidden;
  background:var(--bg);
  font-family:var(--sans);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  font-feature-settings:'ss01' on,'cv11' on;
  text-rendering:optimizeLegibility;
}
#root{
  height:100%;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}

/* — form kontrolleri — */
input,select,textarea{
  font-size:16px!important; /* iOS zoom engelleme */
  -webkit-appearance:none;appearance:none;
  font-family:inherit;outline:none;
  color:var(--ink);
}
button{
  -webkit-appearance:none;appearance:none;
  font-family:inherit;cursor:pointer;
  transition:transform .14s ease,box-shadow .18s ease,background .18s ease,border-color .15s ease,opacity .12s ease;
  touch-action:manipulation;
}
button:active{transform:scale(.972);opacity:.92}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:0;height:0;display:none}

/* — safe-area helper — */
.st{padding-top:var(--sa-t)}
.sb{padding-bottom:calc(var(--sa-b) + 4px)}

/* ═══════════════════════════════════════════════════════════════
   CARD / SURFACE
   ═══════════════════════════════════════════════════════════════ */
.card{
  background:var(--card);
  border-radius:var(--r-lg);
  border:1px solid var(--line);
  box-shadow:0 1px 2px rgba(26,26,26,.03),0 2px 6px rgba(26,26,26,.04);
  padding:16px;
}

/* ═══════════════════════════════════════════════════════════════
   INPUTS / LABELS
   ═══════════════════════════════════════════════════════════════ */
.inp{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--r-sm);
  padding:12px 14px;
  color:var(--ink);
  width:100%;display:block;
  transition:border-color .15s,box-shadow .15s,background .15s;
  font-weight:500;
  min-height:46px;
  line-height:1.25;
}
.inp:focus{
  border-color:var(--brand);
  background:var(--card);
  box-shadow:0 0 0 3px rgba(184,50,47,.12);
}
.inp::placeholder{color:var(--ink-4);font-weight:500}

select.inp,select{
  background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6'%3e%3cpath d='M1 1l4 4 4-4' stroke='%237A746B' stroke-width='1.5' fill='none' stroke-linecap='round'/%3e%3c/svg%3e");
  background-repeat:no-repeat;background-position:right 12px center;background-size:10px;
  padding-right:34px;
}

.lbl{
  font-size:10.5px;font-weight:700;
  color:var(--ink-3);
  letter-spacing:.7px;text-transform:uppercase;
  display:block;margin-bottom:6px;
}

/* ═══════════════════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════════════════ */
.mo{
  position:fixed;inset:0;
  background:rgba(20,19,18,.56);
  z-index:50;
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  animation:moFade .22s ease-out;
}
.ms{
  width:100%;max-width:560px;
  background:var(--card);
  border-radius:var(--r-2xl) var(--r-2xl) 0 0;
  padding:22px 22px calc(22px + var(--sa-b));
  max-height:92vh;overflow-y:auto;
  box-shadow:0 -8px 40px rgba(20,19,18,.22);
  animation:moSlide .3s cubic-bezier(.22,.9,.3,1);
}
@keyframes moFade{from{opacity:0}to{opacity:1}}
@keyframes moSlide{from{transform:translateY(24px);opacity:.4}to{transform:translateY(0);opacity:1}}

/* ═══════════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════════ */
.toast{
  position:fixed;
  top:calc(var(--sa-t) + 16px);left:50%;
  transform:translateX(-50%);
  background:linear-gradient(135deg,#2A1F1C 0%,#1F1715 100%);
  color:#fff;
  padding:11px 24px;
  border-radius:40px;
  font-size:13px;font-weight:600;
  z-index:999;pointer-events:none;white-space:nowrap;
  box-shadow:0 12px 32px rgba(31,23,21,.32),0 0 0 1px rgba(255,255,255,.06) inset;
  letter-spacing:.1px;
  border:1px solid rgba(255,255,255,.1);
  animation:tShow .25s ease-out;
}
@keyframes tShow{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ═══════════════════════════════════════════════════════════════
   HEADER — üst şerit
   ═══════════════════════════════════════════════════════════════ */
.hdr{
  background:linear-gradient(180deg,#FFFFFF 0%,#FDFAF7 100%);
  border-bottom:1px solid var(--line);
  padding-top:var(--sa-t);
  position:sticky;top:0;z-index:30;
  backdrop-filter:saturate(1.3);
  -webkit-backdrop-filter:saturate(1.3);
}
.hdr-inner{
  padding:12px 16px 14px;
  max-width:560px;margin:0 auto;
  display:flex;align-items:center;gap:12px;
}
.avatar-ring{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#9B1B30 0%,#B02A3F 50%,#C89B7B 120%);
  padding:2.5px;
  box-shadow:0 4px 14px rgba(184,50,47,.28),0 1px 3px rgba(184,50,47,.18);
  flex-shrink:0;position:relative;
}
.avatar-inner{
  width:100%;height:100%;border-radius:50%;
  background:#FFFFFF;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:17px;color:var(--brand);
  letter-spacing:-.3px;
}
.hdr-status{
  position:absolute;right:-3px;bottom:-3px;
  width:16px;height:16px;border-radius:50%;
  border:2.5px solid #FFFFFF;z-index:2;
  box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.hdr-status-on{background:#2D7A4A}
.hdr-status-off{background:#9B1B30}
.hdr-iconbtn{
  width:42px;height:42px;border-radius:14px;
  background:var(--card);
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);
  flex-shrink:0;
  box-shadow:0 1px 3px rgba(31,23,21,.04);
  transition:all .18s ease;
}
.hdr-iconbtn:active{background:var(--surface);transform:scale(.94)}

/* ═══════════════════════════════════════════════════════════════
   HIZLI ERİŞİM KARTLARI (Ana sayfadaki yuvarlak kartlar)
   ═══════════════════════════════════════════════════════════════ */
.qa-scroll{
  overflow-x:auto;overflow-y:hidden;
  margin:0 -16px;padding:6px 16px 14px;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
}
.qa-scroll::-webkit-scrollbar{display:none}
.qa-row{display:flex;gap:14px;padding-bottom:2px}
.qa-item{
  flex-shrink:0;
  width:78px;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  scroll-snap-align:start;
  background:none;border:none;padding:0;
}
.qa-circle{
  width:68px;height:68px;border-radius:50%;
  background:#FFFFFF;
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:27px;
  box-shadow:0 3px 10px rgba(31,23,21,.06),inset 0 1px 0 rgba(255,255,255,.8);
  position:relative;
  transition:transform .16s ease,box-shadow .2s ease;
}
.qa-item:active .qa-circle{transform:scale(.93)}
.qa-circle-red{
  background:linear-gradient(135deg,#9B1B30 0%,#7A1525 100%);
  border-color:#7A1525;
  color:#fff;
  box-shadow:0 6px 18px rgba(184,50,47,.32),inset 0 1px 0 rgba(255,255,255,.18);
}
.qa-circle-red-soft{
  background:linear-gradient(135deg,#F8E5E9 0%,#F0D4DB 100%);
  border-color:var(--brand-bd);
  color:var(--brand);
}
.qa-circle-nude{
  background:linear-gradient(135deg,#F7ECDF 0%,#E9D4BA 100%);
  border-color:#D9BFA0;
  color:#7A5530;
}
.qa-circle-dark{
  background:linear-gradient(135deg,#2A1F1C 0%,#1F1715 100%);
  border-color:#1F1715;
  color:#fff;
  box-shadow:0 4px 14px rgba(31,23,21,.30),inset 0 1px 0 rgba(255,255,255,.08);
}
.qa-circle-vehicle{
  background:linear-gradient(135deg,#F2ECE7 0%,#E5DBD1 100%);
  border-color:var(--line-2);
  color:var(--ink-2);
}
.qa-badge{
  position:absolute;top:-2px;right:-2px;
  min-width:20px;height:20px;padding:0 6px;
  background:var(--brand);color:#fff;
  border-radius:10px;border:2px solid #FFFFFF;
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  line-height:1;
  box-shadow:0 2px 6px rgba(184,50,47,.35);
}
.qa-label{
  font-size:11.5px;font-weight:600;color:var(--ink-2);
  text-align:center;line-height:1.2;
  max-width:78px;letter-spacing:-.1px;
}

/* ═══════════════════════════════════════════════════════════════
   HERO CARDS (ana ekran premium özet kartlar)
   ═══════════════════════════════════════════════════════════════ */
.hero-scroll{
  overflow-x:auto;display:flex;gap:14px;
  margin:0 -16px;padding:6px 16px 16px;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}
.hero-scroll::-webkit-scrollbar{display:none}
.hero-card{
  flex-shrink:0;
  width:280px;min-height:160px;
  border-radius:var(--r-lg);
  padding:18px 20px;
  scroll-snap-align:start;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:space-between;
  box-shadow:0 4px 20px rgba(31,23,21,.08),0 1px 3px rgba(31,23,21,.04);
  border:1px solid transparent;
  transition:transform .15s ease,box-shadow .22s ease;
  cursor:pointer;
}
.hero-card:active{transform:scale(.985)}
.hero-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.18) 0%,transparent 70%);
  pointer-events:none;
}
.hero-card-red{
  background:linear-gradient(135deg,#9B1B30 0%,#7A1525 60%,#7D1E1B 110%);
  color:#fff;
}
.hero-card-nude{
  background:linear-gradient(135deg,#F9EFE6 0%,#F0DFCE 100%);
  color:#5B3D24;
  border-color:#E5CFB9;
}
.hero-card-ivory{
  background:linear-gradient(135deg,#FFFFFF 0%,#FBF6F1 100%);
  color:var(--ink);
  border-color:var(--line);
}
.hero-card-softred{
  background:linear-gradient(135deg,#F8E5E9 0%,#EDC9D3 100%);
  color:#7D1E1B;
  border-color:var(--brand-bd);
}
.hero-label{
  font-size:10.5px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;opacity:.8;
  display:flex;align-items:center;gap:6px;
}
.hero-value{
  font-size:26px;font-weight:800;letter-spacing:-.6px;
  font-variant-numeric:tabular-nums;margin-top:6px;
  line-height:1.1;
}
.hero-hint{
  font-size:12px;font-weight:500;opacity:.75;margin-top:6px;
  line-height:1.35;
}
.hero-action{
  font-size:11px;font-weight:700;opacity:.85;
  display:inline-flex;align-items:center;gap:4px;
  margin-top:8px;
}

/* ═══════════════════════════════════════════════════════════════
   BÖLÜM BAŞLIĞI
   ═══════════════════════════════════════════════════════════════ */
.section-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 2px 8px;
}
.section-hd-title{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
.section-hd-action{
  font-size:12px;font-weight:700;color:var(--brand);
  letter-spacing:.2px;background:none;border:none;
  display:inline-flex;align-items:center;gap:3px;
}

/* ═══════════════════════════════════════════════════════════════
   TRANSFER CARD — sade, premium, işlevsel
   ═══════════════════════════════════════════════════════════════ */
.tcard{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--r-md);
  margin-bottom:10px;
  overflow:hidden;
  box-shadow:0 1px 3px rgba(31,23,21,.04);
  transition:box-shadow .2s ease,border-color .18s ease,transform .12s ease;
  position:relative;
}
.tcard.is-open{
  box-shadow:0 8px 28px rgba(31,23,21,.10);
  border-color:var(--brand-bd);
}
.tcard-header{
  display:flex;align-items:stretch;cursor:pointer;
  min-height:94px;
}
.tcard-stripe{
  width:4px;flex-shrink:0;
  background:var(--line-strong);
}
.tcard.t-arrival .tcard-stripe{background:linear-gradient(180deg,#BC5D56,#9E3A35)}
.tcard.t-departure .tcard-stripe{background:linear-gradient(180deg,#C4BCB0,#A89E90)}
.tcard.t-tour .tcard-stripe{background:linear-gradient(180deg,#6B94B8,#4A7296)}
.tcard.t-intercity .tcard-stripe{background:linear-gradient(180deg,#C4A880,#9E8460)}
.tcard-body{flex:1;min-width:0;padding:13px 14px;display:flex;gap:11px;align-items:stretch}
.tcard-time{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding-right:11px;
  border-right:1px dashed var(--line);
  min-width:58px;
}
.tcard-time-big{
  font-size:17px;font-weight:800;color:var(--ink);
  font-variant-numeric:tabular-nums;letter-spacing:-.3px;
}
.tcard-time-type{
  font-size:17px;margin-top:4px;
  line-height:1;
}
.tcard-main{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;gap:4px}
.tcard-pills{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-bottom:2px}
.tcard-pill{
  font-size:10px;font-weight:700;
  padding:2.5px 8px;border-radius:6px;
  letter-spacing:.3px;white-space:nowrap;line-height:1.4;
}
.tcard-pill-status-tam{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
.tcard-pill-status-iptal{background:var(--err-bg);color:var(--err);border:1px solid var(--err-bd)}
.tcard-pill-status-bos{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)}
.tcard-pill-flight{background:var(--info-bg);color:var(--info);border:1px solid var(--info-bd)}
.tcard-pill-neutral{background:var(--surface);color:var(--ink-3);border:1px solid var(--line)}
.tcard-pill-alt{background:var(--accent-soft);color:#8A5F2A;border:1px solid #E0C9A8}
.tcard-agency{
  font-size:13px;font-weight:700;color:var(--ink);
  line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tcard-agency .arrow{color:var(--ink-4);margin:0 6px;font-weight:500}
.tcard-route{
  font-size:12px;font-weight:600;color:var(--ink-2);
  line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tcard-route .arrow{color:var(--ink-4);margin:0 4px}
.tcard-passenger{
  font-size:11px;color:var(--ink-3);font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tcard-right{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;
  text-align:right;
  padding-left:8px;
}
.tcard-amount{
  font-size:16px;font-weight:800;
  color:var(--brand);
  font-variant-numeric:tabular-nums;
  line-height:1.15;letter-spacing:-.3px;
  white-space:nowrap;
}
.tcard-amount.is-none{color:var(--ink-4);font-weight:700;font-size:12px}
.tcard-amount-sub{
  font-size:10px;color:var(--ink-3);font-weight:600;
  letter-spacing:.2px;margin-top:1px;
}
.tcard-paystatus{
  font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:6px;
  letter-spacing:.2px;white-space:nowrap;
  display:inline-flex;align-items:center;gap:3px;
  margin-top:5px;
}
.tcard-paystatus.is-paid{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
.tcard-paystatus.is-pending{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)}

.tcard-expanded{
  border-top:1px solid var(--line);
  background:linear-gradient(180deg,#FDFAF7 0%,#FFFFFF 100%);
  padding:14px;
}

/* ═══════════════════════════════════════════════════════════════
   DATE HEADER — günü başlatan bar
   ═══════════════════════════════════════════════════════════════ */
.date-hdr{
  background:linear-gradient(135deg,#9B1B30 0%,#7A1525 60%,#7D1E1B 110%);
  border:none;
  border-radius:var(--r-sm);
  padding:12px 18px;
  margin:18px 0 10px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 6px 18px rgba(184,50,47,.22),inset 0 1px 0 rgba(255,255,255,.12);
  position:relative;overflow:hidden;
}
.date-hdr::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,#F8E5E9 0%,#B02A3F 50%,#9B1B30 100%);
  box-shadow:0 0 12px rgba(255,255,255,.3);
}
.date-hdr::after{
  content:'';position:absolute;top:-20px;right:-20px;
  width:100px;height:100px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.12) 0%,transparent 70%);
  pointer-events:none;
}
.date-hdr-txt{
  font-size:12.5px;font-weight:700;color:#FFFFFF;
  letter-spacing:1px;text-transform:uppercase;
  text-shadow:0 1px 2px rgba(0,0,0,.22);
  position:relative;
}
.date-hdr-meta{
  font-size:10px;color:rgba(255,255,255,.82);
  font-weight:600;letter-spacing:.3px;text-transform:uppercase;
  position:relative;
}

.bugun-inline{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--card);color:var(--brand);
  border:1px solid var(--brand-bd);
  border-radius:20px;padding:7px 15px;
  font-size:11px;font-weight:700;letter-spacing:.3px;
  margin:0 0 10px;
  box-shadow:0 2px 6px rgba(184,50,47,.12);
}
.bugun-inline:active{background:var(--brand-softer)}

/* ═══════════════════════════════════════════════════════════════
   ALT TAB BAR — sabit, premium
   ═══════════════════════════════════════════════════════════════ */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;
  padding-bottom:var(--sa-b);
  background:rgba(255,255,255,.95);
  backdrop-filter:saturate(1.6) blur(20px);
  -webkit-backdrop-filter:saturate(1.6) blur(20px);
  border-top:1px solid var(--line);
  z-index:40;
  box-shadow:0 -6px 24px rgba(31,23,21,.06);
}
.tabbar-inner{
  display:flex;align-items:stretch;
  max-width:560px;margin:0 auto;
  height:var(--tabbar-h);
  padding:0 4px;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:none;border:none;
  color:var(--ink-3);font-weight:600;
  font-size:10.5px;letter-spacing:.15px;
  padding:8px 2px;border-radius:var(--r-md);
  position:relative;min-height:56px;
  transition:color .15s ease;
}
.tab-icon{font-size:23px;line-height:1;transition:transform .18s ease}
.tab.is-active{color:var(--brand)}
.tab.is-active .tab-label{font-weight:800}
.tab.is-active .tab-icon{transform:scale(1.1)}
.tab.is-active::before{
  content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);
  width:30px;height:3px;border-radius:2px;
  background:linear-gradient(90deg,#9B1B30 0%,#B02A3F 100%);
  box-shadow:0 1px 4px rgba(184,50,47,.35);
}
.tab-fab{
  align-self:center;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#B02A3F 0%,#9B1B30 55%,#7A1525 100%);
  color:#fff;font-size:28px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  border:none;margin:0 4px;
  box-shadow:
    0 6px 18px rgba(184,50,47,.45),
    0 2px 6px rgba(184,50,47,.25),
    inset 0 1px 0 rgba(255,255,255,.22),
    0 0 0 5px rgba(255,255,255,.95);
  position:relative;top:-12px;
}
.tab-fab:active{transform:scale(.9)}

/* ═══════════════════════════════════════════════════════════════
   AMOUNT HELPERS
   ═══════════════════════════════════════════════════════════════ */
.amt-pos{color:var(--ok);font-variant-numeric:tabular-nums}
.amt-neg{color:var(--err);font-variant-numeric:tabular-nums}

/* ═══════════════════════════════════════════════════════════════
   LEGACY tr-row, tr-arrival vs. — eski kodlarla uyumluluk
   ═══════════════════════════════════════════════════════════════ */
.tr-row{transition:box-shadow .18s ease,border-color .18s ease,transform .12s ease}
.tr-row:hover{box-shadow:0 4px 18px rgba(26,26,26,.08)}
.tr-arrival{background:linear-gradient(180deg,var(--t-arrival-bg) 0%,#FFFFFF 70%) !important;border-left:3px solid var(--t-arrival-bd) !important}
.tr-departure{background:linear-gradient(180deg,var(--t-departure-bg) 0%,#FFFFFF 70%) !important;border-left:3px solid var(--t-departure-bd) !important}
.tr-tour{background:linear-gradient(180deg,var(--t-tour-bg) 0%,#FFFFFF 70%) !important;border-left:3px solid var(--t-tour-bd) !important}
.tr-intercity{background:linear-gradient(180deg,var(--t-intercity-bg) 0%,#FFFFFF 70%) !important;border-left:3px solid var(--t-intercity-bd) !important}

/* ═══════════════════════════════════════════════════════════════
   MAIN CONTAINER
   ═══════════════════════════════════════════════════════════════ */
main.main-cont{
  padding:12px 16px calc(var(--tabbar-h) + var(--sa-b) + 20px);
  max-width:560px;margin:0 auto;
}

/* Desktop */
@media (min-width:900px){
  html,body{background:#E5DFD1}
  main.main-cont{max-width:1200px!important;padding:18px 24px calc(var(--tabbar-h) + 40px)!important}
  .desk-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px}
  .desk-wide{grid-column:1/-1}
  .card{padding:18px}
  .hero-card{width:300px}
}
@media (min-width:1200px){
  main.main-cont{max-width:1320px!important}
  .desk-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
}
</style>

        }
    }

    try {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.rel = 'noopener';

            a.remove();
        }, 1500);
        return true;
    }
    catch (e) { }
