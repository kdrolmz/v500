<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KÖ Transfer Takip">
<meta name="theme-color" content="#FFFFFF">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="app-icon-512.png">
<link rel="shortcut icon" type="image/png" href="apple-touch-icon.png">
<title>KÖ Transfer Takip</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   TRANSFER BİLGİLERİ — APPLE PREMIUM KURUMSAL TASARIM SİSTEMİ v3.0
   iPhone first · Mac uyumlu · Cam yüzey, net hiyerarşi
   ═══════════════════════════════════════════════════════════════ */

:root{
  /* — yüzeyler — Natural Titanium / soft glass — */
  --bg:#FFFFFF;
  --bg-2:#FFFFFF;
  --card:#FFFFFF;
  --card-2:#FFFFFF;
  --surface:#FFFFFF;
  --surface-2:#F7F8F8;

  /* — çizgiler — */
  --line:#DED8D0;
  --line-2:#C9C1B8;
  --line-strong:#B6ADA1;

  /* — metin — */
  --ink:#1F1D1A;
  --ink-2:#38342F;
  --ink-3:#6E665E;
  --ink-4:#9B9187;

  /* — MARKA — iPhone 16 Pro Natural Titanium — */
  --brand:#8A8378;
  --brand-2:#4F4A43;
  --brand-3:#B6ADA1;
  --brand-soft:#FFFFFF;
  --brand-softer:#FFFFFF;
  --brand-bd:#D8D0C6;
  --nude:#B6ADA1;
  --nude-deep:#6E665E;
  --nude-soft:#FFFFFF;
  --nude-glow:#DED8D0;

  --accent:#8A8378;
  --accent-2:#4F4A43;
  --accent-soft:#F2EFEA;

  /* — semantik — */
  --ok:#126C37; --ok-bg:#E3F1E7; --ok-bd:#7DB68B;
  --warn:#FF9F0A; --warn-bg:#FFF5E5; --warn-bd:#FFD69A;
  --err:#B95A54; --err-bg:#FFF1EF; --err-bd:#E3B8B4;
  --info:#8A8378; --info-bg:#FFFFFF; --info-bd:#D8D0C6;

  /* — transfer tipi pasteller — */
  --t-arrival-bg:#F2EFEA;   --t-arrival-bd:#D8D0C6;
  --t-departure-bg:#F2EFEA; --t-departure-bd:#D8D0C6;
  --t-tour-bg:#F2EFEA;      --t-tour-bd:#D8D0C6;
  --t-intercity-bg:#FFF5E5; --t-intercity-bd:#FFD69A;

  /* — radius — */
  --r-xs:6px; --r-sm:8px; --r-md:10px; --r-lg:12px; --r-xl:14px; --r-2xl:18px;

  /* — tipografi — */
  --sans:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif;

  /* — safe-area — */
  --sa-t:env(safe-area-inset-top,0px);
  --sa-b:env(safe-area-inset-bottom,0px);
  --sa-l:env(safe-area-inset-left,0px);
  --sa-r:env(safe-area-inset-right,0px);

  /* — alt tab yüksekliği — */
  --tabbar-h:76px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;overflow:hidden;
  background:linear-gradient(180deg,#FFFFFF 0%,#FFFFFF 100%);
  background-attachment:fixed;
  font-family:var(--sans);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  font-feature-settings:'ss01' on,'cv11' on;
  text-rendering:optimizeLegibility;
}
#root{
  height:100%;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}

/* — form kontrolleri — */
input,select,textarea{
  font-size:16px!important; /* iOS zoom engelleme */
  -webkit-appearance:none;appearance:none;
  font-family:inherit;outline:none;
  color:var(--ink);
}
button{
  -webkit-appearance:none;appearance:none;
  font-family:inherit;cursor:pointer;
  transition:transform .14s ease,box-shadow .18s ease,background .18s ease,border-color .15s ease,opacity .12s ease;
  touch-action:manipulation;
}
button:active{transform:scale(.972);opacity:.92}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:0;height:0;display:none}

/* — safe-area helper — */
.st{padding-top:var(--sa-t)}
.sb{padding-bottom:calc(var(--sa-b) + 4px)}

/* ═══════════════════════════════════════════════════════════════
   CARD / SURFACE
   ═══════════════════════════════════════════════════════════════ */
.card{
  background:rgba(255,255,255,.86);
  border-radius:var(--r-lg);
  border:1px solid var(--line);
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 14px 34px rgba(0,0,0,.06);
  padding:16px;
  backdrop-filter:saturate(1.5) blur(18px);
  -webkit-backdrop-filter:saturate(1.5) blur(18px);
}

/* ═══════════════════════════════════════════════════════════════
   INPUTS / LABELS
   ═══════════════════════════════════════════════════════════════ */
.inp{
  background:rgba(242,242,247,.9);
  border:1px solid var(--line);
  border-radius:var(--r-sm);
  padding:12px 14px;
  color:var(--ink);
  width:100%;display:block;
  transition:border-color .15s,box-shadow .15s,background .15s;
  font-weight:500;
  min-height:46px;
  line-height:1.25;
}
.inp:focus{
  border-color:var(--brand);
  background:var(--card);
  box-shadow:0 0 0 4px rgba(79,74,67,.16);
}
.inp::placeholder{color:var(--ink-4);font-weight:500}

select.inp,select{
  background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6'%3e%3cpath d='M1 1l4 4 4-4' stroke='%236E6E73' stroke-width='1.5' fill='none' stroke-linecap='round'/%3e%3c/svg%3e");
  background-repeat:no-repeat;background-position:right 12px center;background-size:10px;
  padding-right:34px;
}

.lbl{
  font-size:10.5px;font-weight:700;
  color:var(--ink-3);
  letter-spacing:.7px;text-transform:uppercase;
  display:block;margin-bottom:6px;
}

/* ═══════════════════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════════════════ */
.mo{
  position:fixed;inset:0;
  background:rgba(29,29,31,.44);
  z-index:50;
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  animation:moFade .22s ease-out;
}
.ms{
  width:100%;max-width:560px;
  background:var(--card);
  border-radius:var(--r-2xl) var(--r-2xl) 0 0;
  padding:22px 22px calc(22px + var(--sa-b));
  max-height:92vh;overflow-y:auto;
  box-shadow:0 -18px 50px rgba(0,0,0,.18);
  animation:moSlide .3s cubic-bezier(.22,.9,.3,1);
}
@keyframes moFade{from{opacity:0}to{opacity:1}}
@keyframes moSlide{from{transform:translateY(24px);opacity:.4}to{transform:translateY(0);opacity:1}}

/* ═══════════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════════ */
.toast{
  position:fixed;
  top:calc(var(--sa-t) + 16px);left:50%;
  transform:translateX(-50%);
  background:rgba(29,29,31,.92);
  color:#fff;
  padding:11px 24px;
  border-radius:40px;
  font-size:13px;font-weight:600;
  z-index:999;pointer-events:none;white-space:nowrap;
  box-shadow:0 12px 32px rgba(0,0,0,.22),0 0 0 1px rgba(255,255,255,.08) inset;
  letter-spacing:.1px;
  border:1px solid rgba(255,255,255,.1);
  animation:tShow .25s ease-out;
}
@keyframes tShow{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ═══════════════════════════════════════════════════════════════
   HEADER — üst şerit
   ═══════════════════════════════════════════════════════════════ */
.hdr{
  background:rgba(251,251,253,.82);
  border-bottom:1px solid var(--line);
  padding-top:var(--sa-t);
  position:sticky;top:0;z-index:30;
  backdrop-filter:saturate(1.8) blur(22px);
  -webkit-backdrop-filter:saturate(1.8) blur(22px);
}
.hdr-inner{
  padding:12px 16px 14px;
  max-width:560px;margin:0 auto;
  display:flex;align-items:center;gap:12px;
}
.avatar-ring{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#1F1D1A 0%,#636366 58%,#8A8378 120%);
  padding:2.5px;
  box-shadow:0 10px 24px rgba(0,0,0,.14),0 1px 3px rgba(0,0,0,.12);
  flex-shrink:0;position:relative;
}
.avatar-inner{
  width:100%;height:100%;border-radius:50%;
  background:#FFFFFF;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:17px;color:var(--brand);
  letter-spacing:0;
}
.hdr-status{
  position:absolute;right:-3px;bottom:-3px;
  width:16px;height:16px;border-radius:50%;
  border:2.5px solid #FFFFFF;z-index:2;
  box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.hdr-status-on{background:var(--ok)}
.hdr-status-off{background:var(--ink-4)}
.hdr-iconbtn{
  width:42px;height:42px;border-radius:14px;
  background:rgba(255,255,255,.78);
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);
  flex-shrink:0;
  box-shadow:0 1px 2px rgba(0,0,0,.04),inset 0 1px 0 rgba(255,255,255,.86);
  transition:all .18s ease;
}
.hdr-iconbtn:active{background:var(--surface);transform:scale(.94)}

/* ═══════════════════════════════════════════════════════════════
   HIZLI ERİŞİM KARTLARI (Ana sayfadaki yuvarlak kartlar)
   ═══════════════════════════════════════════════════════════════ */
.qa-scroll{
  overflow-x:auto;overflow-y:hidden;
  margin:0 -16px;padding:6px 16px 14px;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
}
.qa-scroll::-webkit-scrollbar{display:none}
.qa-row{display:flex;gap:14px;padding-bottom:2px}
.qa-item{
  flex-shrink:0;
  width:78px;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  scroll-snap-align:start;
  background:none;border:none;padding:0;
}
.qa-circle{
  width:68px;height:68px;border-radius:50%;
  background:rgba(255,255,255,.88);
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:27px;
  box-shadow:0 8px 20px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.9);
  position:relative;
  transition:transform .16s ease,box-shadow .2s ease;
}
.qa-item:active .qa-circle{transform:scale(.93)}
.qa-circle-red{
  background:linear-gradient(135deg,#8A8378 0%,#4F4A43 100%);
  border-color:#4F4A43;
  color:#fff;
  box-shadow:0 10px 24px rgba(79,74,67,.28),inset 0 1px 0 rgba(255,255,255,.18);
}
.qa-circle-red-soft{
  background:linear-gradient(135deg,#FFFFFF 0%,rgba(255,255,255,.78) 100%);
  border-color:var(--brand-bd);
  color:var(--brand);
}
.qa-circle-nude{
  background:linear-gradient(135deg,#FFFFFF 0%,rgba(255,255,255,.78) 100%);
  border-color:#C9C1B8;
  color:#38342F;
}
.qa-circle-dark{
  background:linear-gradient(135deg,#1F1D1A 0%,#38342F 100%);
  border-color:#1F1D1A;
  color:#fff;
  box-shadow:0 10px 24px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.08);
}
.qa-circle-vehicle{
  background:linear-gradient(135deg,#FFFFFF 0%,#F7F8F8 100%);
  border-color:var(--line-2);
  color:var(--ink-2);
}
.qa-badge{
  position:absolute;top:-2px;right:-2px;
  min-width:20px;height:20px;padding:0 6px;
  background:var(--brand);color:#fff;
  border-radius:10px;border:2px solid #FFFFFF;
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  line-height:1;
  box-shadow:0 2px 8px rgba(79,74,67,.35);
}
.qa-label{
  font-size:11.5px;font-weight:600;color:var(--ink-2);
  text-align:center;line-height:1.2;
  max-width:78px;letter-spacing:0;
}

/* ═══════════════════════════════════════════════════════════════
   HERO CARDS (ana ekran premium özet kartlar)
   ═══════════════════════════════════════════════════════════════ */
.hero-scroll{
  overflow-x:auto;display:flex;gap:14px;
  margin:0 -16px;padding:6px 16px 16px;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}
.hero-scroll::-webkit-scrollbar{display:none}
.hero-card{
  flex-shrink:0;
  width:280px;min-height:160px;
  border-radius:var(--r-lg);
  padding:18px 20px;
  scroll-snap-align:start;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:space-between;
  box-shadow:0 14px 34px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  border:1px solid transparent;
  transition:transform .15s ease,box-shadow .22s ease;
  cursor:pointer;
}
.hero-card:active{transform:scale(.985)}
.hero-card::before{
  content:none;
}
.hero-card-red{
  background:linear-gradient(135deg,#8A8378 0%,#4F4A43 100%);
  color:#fff;
}
.hero-card-nude{
  background:linear-gradient(135deg,#FFFFFF 0%,#F6F3EF 100%);
  color:var(--ink);
  border-color:var(--line);
}
.hero-card-ivory{
  background:linear-gradient(135deg,#FFFFFF 0%,#F6F3EF 100%);
  color:var(--ink);
  border-color:var(--line);
}
.hero-card-softred{
  background:linear-gradient(135deg,#FFFFFF 0%,rgba(255,255,255,.76) 100%);
  color:var(--brand);
  border-color:var(--brand-bd);
}
.hero-label{
  font-size:10.5px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;opacity:.8;
  display:flex;align-items:center;gap:6px;
}
.hero-value{
  font-size:26px;font-weight:800;letter-spacing:0;
  font-variant-numeric:tabular-nums;margin-top:6px;
  line-height:1.1;
}
.hero-hint{
  font-size:12px;font-weight:500;opacity:.75;margin-top:6px;
  line-height:1.35;
}
.hero-action{
  font-size:11px;font-weight:700;opacity:.85;
  display:inline-flex;align-items:center;gap:4px;
  margin-top:8px;
}

/* ═══════════════════════════════════════════════════════════════
   BÖLÜM BAŞLIĞI
   ═══════════════════════════════════════════════════════════════ */
.section-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 2px 8px;
}
.section-hd-title{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:0}
.section-hd-action{
  font-size:12px;font-weight:700;color:var(--brand);
  letter-spacing:.2px;background:none;border:none;
  display:inline-flex;align-items:center;gap:3px;
}

/* ═══════════════════════════════════════════════════════════════
   TRANSFER CARD — sade, premium, işlevsel
   ═══════════════════════════════════════════════════════════════ */
.tcard{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--r-md);
  margin-bottom:10px;
  overflow:hidden;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 10px 24px rgba(0,0,0,.04);
  transition:box-shadow .2s ease,border-color .18s ease,transform .12s ease;
  position:relative;
}
.tcard.is-open{
  box-shadow:0 18px 44px rgba(0,0,0,.10);
  border-color:var(--brand-bd);
}
.tcard-header{
  display:flex;align-items:stretch;cursor:pointer;
  min-height:94px;
}
.tcard-stripe{
  width:4px;flex-shrink:0;
  background:var(--line-strong);
}
.tcard.t-arrival .tcard-stripe{background:linear-gradient(180deg,#8A8378,#4F4A43)}
.tcard.t-departure .tcard-stripe{background:linear-gradient(180deg,#B6ADA1,#4F4A43)}
.tcard.t-tour .tcard-stripe{background:linear-gradient(180deg,#8A8378,#4F4A43)}
.tcard.t-intercity .tcard-stripe{background:linear-gradient(180deg,#FF9F0A,#C46D00)}
.tcard-body{
  flex:1;min-width:0;padding:12px 13px;
  display:grid;grid-template-columns:minmax(54px,auto) minmax(0,1fr) auto;
  column-gap:10px;row-gap:6px;align-items:start;
}
.tcard-time{
  grid-column:1;grid-row:1 / span 2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  align-self:stretch;padding-right:10px;
  border-right:1px dashed var(--line);
  min-width:54px;
}
.tcard-time-big{
  font-size:17px;font-weight:800;color:var(--ink);
  font-variant-numeric:tabular-nums;letter-spacing:0;
}
.tcard-time-type{
  font-size:17px;margin-top:4px;
  line-height:1;
}
.tcard-main{grid-column:2;grid-row:1;min-width:0;display:flex;flex-direction:column;justify-content:flex-start;gap:4px}
.tcard-flow{
  grid-column:2 / 4;grid-row:2;min-width:0;
  display:flex;flex-direction:column;gap:3px;padding-top:1px;
}
.tcard-pills{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-bottom:2px}
.tcard-pill{
  font-size:10px;font-weight:700;
  padding:2.5px 8px;border-radius:6px;
  letter-spacing:.3px;white-space:nowrap;line-height:1.4;
}
.tcard-pill-status-tam{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
.tcard-pill-status-iptal{background:var(--err-bg);color:var(--err);border:1px solid var(--err-bd)}
.tcard-pill-status-bos{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)}
.tcard-pill-flight{background:var(--info-bg);color:var(--info);border:1px solid var(--info-bd)}
.tcard-pill-neutral{background:var(--surface);color:var(--ink-3);border:1px solid var(--line)}
.tcard-pill-alt{background:var(--accent-soft);color:var(--accent-2);border:1px solid #D8D0C6}
.tcard-agency{
  font-size:13px;font-weight:700;color:var(--ink);
  line-height:1.3;
  white-space:normal;overflow:visible;text-overflow:clip;
  overflow-wrap:anywhere;word-break:break-word;
}
.tcard-agency .arrow{color:var(--ink-4);margin:0 6px;font-weight:500}
.tcard-route{
  font-size:12px;font-weight:600;color:var(--ink-2);
  line-height:1.3;
  white-space:normal;overflow:visible;text-overflow:clip;
  overflow-wrap:anywhere;word-break:break-word;
}
.tcard-route .arrow{color:var(--ink-4);margin:0 4px}
.tcard-passenger{
  font-size:11px;color:var(--ink-3);font-weight:500;
  white-space:normal;overflow:visible;text-overflow:clip;
  overflow-wrap:anywhere;word-break:break-word;
}
.tcard-right{
  grid-column:3;grid-row:1;min-width:86px;
  display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;
  text-align:right;
  padding-left:6px;gap:5px;
}
.tcard-amount{
  font-size:16px;font-weight:800;
  color:var(--ok);
  font-variant-numeric:tabular-nums;
  line-height:1.15;letter-spacing:0;
  white-space:nowrap;
}
.tcard-amount.is-none{color:var(--ink-4);font-weight:700;font-size:12px}
.tcard-amount-sub{
  font-size:10px;color:var(--ink-3);font-weight:600;
  letter-spacing:.2px;margin-top:1px;
}
.tcard-paystatus{
  font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:6px;
  letter-spacing:.2px;white-space:nowrap;
  display:inline-flex;align-items:center;gap:3px;
  margin-top:2px;
}
.tcard-paystatus.is-paid{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
.tcard-paystatus.is-pending{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)}

.tcard-expanded{
  border-top:1px solid var(--line);
  background:linear-gradient(180deg,#F6F3EF 0%,#FFFFFF 100%);
  padding:14px;
}

/* ═══════════════════════════════════════════════════════════════
   DATE HEADER — günü başlatan bar
   ═══════════════════════════════════════════════════════════════ */
.date-hdr{
  background:linear-gradient(135deg,#1F1D1A 0%,#38342F 56%,#8A8378 120%);
  border:none;
  border-radius:var(--r-sm);
  padding:12px 18px;
  margin:18px 0 10px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 14px 34px rgba(0,0,0,.16),inset 0 1px 0 rgba(255,255,255,.12);
  position:relative;overflow:hidden;
}
.date-hdr::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,#B6ADA1 0%,#8A8378 100%);
  box-shadow:0 0 12px rgba(255,255,255,.3);
}
.date-hdr::after{
  content:none;
}
.date-hdr-txt{
  font-size:12.5px;font-weight:700;color:#FFFFFF;
  letter-spacing:1px;text-transform:uppercase;
  text-shadow:0 1px 2px rgba(0,0,0,.22);
  position:relative;
}
.date-hdr-meta{
  font-size:10px;color:rgba(255,255,255,.82);
  font-weight:600;letter-spacing:.3px;text-transform:uppercase;
  position:relative;
}

.bugun-inline{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--card);color:var(--brand);
  border:1px solid var(--brand-bd);
  border-radius:20px;padding:7px 15px;
  font-size:11px;font-weight:700;letter-spacing:.3px;
  margin:0 0 10px;
  box-shadow:0 8px 18px rgba(79,74,67,.10);
}
.bugun-inline:active{background:var(--brand-softer)}

/* ═══════════════════════════════════════════════════════════════
   ALT TAB BAR — sabit, premium
   ═══════════════════════════════════════════════════════════════ */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;
  padding-bottom:var(--sa-b);
  background:rgba(251,251,253,.92);
  backdrop-filter:saturate(1.8) blur(24px);
  -webkit-backdrop-filter:saturate(1.8) blur(24px);
  border-top:1px solid var(--line);
  z-index:40;
  box-shadow:0 -10px 26px rgba(0,0,0,.08);
}
.tabbar-inner{
  display:grid;grid-template-columns:repeat(5,minmax(0,1fr));align-items:center;
  max-width:560px;margin:0 auto;
  height:var(--tabbar-h);
  padding:7px 6px 8px;
  gap:4px;
}
.tab{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:none;border:none;
  color:var(--ink-3);font-weight:600;
  font-size:10px;letter-spacing:0;
  padding:6px 2px;border-radius:12px;
  position:relative;min-height:56px;
  transition:color .15s ease,background .15s ease;
}
.tab-icon{height:24px;min-width:24px;font-size:20px;line-height:24px;display:flex;align-items:center;justify-content:center;transition:transform .18s ease}
.tab-label{line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.tab.is-active{color:var(--brand);background:var(--brand-softer)}
.tab.is-active .tab-label{font-weight:800}
.tab.is-active .tab-icon{transform:none}
.tab.is-active::before{
  content:'';position:absolute;top:4px;left:50%;transform:translateX(-50%);
  width:22px;height:3px;border-radius:2px;
  background:linear-gradient(90deg,#8A8378 0%,#B6ADA1 100%);
  box-shadow:0 1px 6px rgba(79,74,67,.28);
}
.tab-fab{
  align-self:center;justify-self:center;
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,#8A8378 0%,#4F4A43 100%);
  color:#fff;font-size:28px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  border:none;margin:0;
  box-shadow:
    0 8px 18px rgba(79,74,67,.28),
    0 2px 5px rgba(79,74,67,.20),
    inset 0 1px 0 rgba(255,255,255,.22),
    0 0 0 1px rgba(255,255,255,.92);
  position:relative;top:0;
}
.tab-fab:active{transform:scale(.96)}

/* ═══════════════════════════════════════════════════════════════
   AMOUNT HELPERS
   ═══════════════════════════════════════════════════════════════ */
.amt-pos{color:var(--ok);font-variant-numeric:tabular-nums}
.amt-neg{color:var(--err);font-variant-numeric:tabular-nums}

/* ═══════════════════════════════════════════════════════════════
   LEGACY tr-row, tr-arrival vs. — eski kodlarla uyumluluk
   ═══════════════════════════════════════════════════════════════ */
.tr-row{transition:box-shadow .18s ease,border-color .18s ease,transform .12s ease}
.tr-row:hover{box-shadow:0 4px 18px rgba(26,26,26,.08)}
.tr-arrival{background:linear-gradient(180deg,var(--t-arrival-bg) 0%,#FFFFFF 70%) !important;border-left:3px solid var(--t-arrival-bd) !important}
.tr-departure{background:linear-gradient(180deg,var(--t-departure-bg) 0%,#FFFFFF 70%) !important;border-left:3px solid var(--t-departure-bd) !important}
.tr-tour{background:linear-gradient(180deg,var(--t-tour-bg) 0%,#FFFFFF 70%) !important;border-left:3px solid var(--t-tour-bd) !important}
.tr-intercity{background:linear-gradient(180deg,var(--t-intercity-bg) 0%,#FFFFFF 70%) !important;border-left:3px solid var(--t-intercity-bd) !important}

/* ═══════════════════════════════════════════════════════════════
   MAIN CONTAINER
   ═══════════════════════════════════════════════════════════════ */
main.main-cont{
  padding:12px 16px calc(var(--tabbar-h) + var(--sa-b) + 20px);
  max-width:560px;margin:0 auto;
}

/* Desktop */
@media (min-width:900px){
  html,body{background:linear-gradient(180deg,#FFFFFF 0%,#FFFFFF 100%)}
  main.main-cont{max-width:1200px!important;padding:18px 24px calc(var(--tabbar-h) + 40px)!important}
  .desk-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px}
  .desk-wide{grid-column:1/-1}
  .card{padding:18px}
  .hero-card{width:300px}
}
@media (min-width:1200px){
  main.main-cont{max-width:1320px!important}
  .desk-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
}

/* ═══════════════════════════════════════════════════════════════
   📅 TAKVİM SEKMESİ
   ═══════════════════════════════════════════════════════════════ */
.tk-wrap{
  display:flex;flex-direction:column;gap:14px;padding:0 2px;
  /* Lokal Natural Titanium palet */
  --tk-green:#126C37;
  --tk-green-deep:#0D4F29;
  --tk-green-deepest:#07331A;
  --tk-green-soft:#6FAE80;
  --tk-green-pale:#E3F1E7;
  --tk-green-paler:#FAFCF8;
  --tk-ti:#9B9187;
  --tk-ti-deep:#6E665E;
  --tk-ti-glow:#D1D1D6;
  --tk-ti-pale:#F6F3EF;
  --tk-line-green:rgba(47,122,70,0.26);
  --tk-line-gold:rgba(118,118,128,0.18);
}
.tk-card{
  background:linear-gradient(180deg,#FFFFFF 0%,#F6F3EF 100%);
  border:1px solid var(--tk-line-gold);border-radius:18px;
  padding:14px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 14px 34px rgba(0,0,0,.06);
}
.tk-month-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line);
}
.tk-month-title{font-weight:600;font-size:17px;color:var(--ink);letter-spacing:0}
.tk-month-title em{font-style:normal;color:var(--tk-ti-deep);font-weight:500;margin-left:6px;letter-spacing:0}
.tk-nav-btn{
  background:var(--surface);border:1px solid var(--line);border-radius:10px;
  width:34px;height:34px;color:var(--ink);font-size:18px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.tk-nav-btn:active{background:var(--tk-green-pale)}
.tk-weekdays{
  display:grid;grid-template-columns:repeat(7,1fr);gap:2px;
  margin-bottom:4px;
}
.tk-weekday{
  text-align:center;font-size:10px;font-weight:800;
  color:var(--ink-3);letter-spacing:.6px;text-transform:uppercase;
  padding:4px 0;
}
.tk-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:3px;
}
.tk-cell{
  aspect-ratio:1;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:10px;
  padding:6px 4px 4px;
  position:relative;
  cursor:pointer;
  transition:all .15s;
  display:flex;flex-direction:column;align-items:center;
  min-height:46px;
}
.tk-cell.tk-other{opacity:.35}
.tk-cell.tk-today{
  background:linear-gradient(180deg,var(--tk-green-pale),var(--tk-green-paler));
  border-color:var(--tk-green);
  box-shadow:0 0 0 2px rgba(18,108,55,.28);
}
.tk-cell.tk-selected{
  background:linear-gradient(180deg,var(--tk-green) 0%,var(--tk-green-deep) 100%);
  border-color:var(--tk-green-deep);
  box-shadow:0 2px 8px rgba(31,46,30,0.20);
}
.tk-cell.tk-selected .tk-cell-num{color:#fff}
.tk-cell-num{
  font-weight:600;font-size:13.5px;color:var(--ink);
  font-variant-numeric:tabular-nums;line-height:1;letter-spacing:0;
}
.tk-cell-dots{
  display:flex;gap:2px;margin-top:auto;flex-wrap:wrap;justify-content:center;
}
.tk-cell-dot{
  width:5px;height:5px;border-radius:50%;
}
.tk-cell.tk-selected .tk-cell-dot{background:rgba(255,255,255,.85)!important}
.tk-cell-count{
  position:absolute;top:3px;right:4px;
  font-size:8.5px;font-weight:600;color:var(--tk-green-deep);
  background:rgba(255,255,255,.95);
  border-radius:8px;padding:1px 4px;line-height:1;
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.tk-cell.tk-selected .tk-cell-count{background:rgba(255,255,255,.95);color:var(--tk-green-deep)}

.tk-day-section{
  background:linear-gradient(180deg,#FFFFFF 0%,#F6F3EF 100%);
  border:1px solid var(--tk-line-gold);border-radius:18px;
  padding:14px 14px 10px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 14px 34px rgba(0,0,0,.06);
}
.tk-day-h{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line);
}
.tk-day-title{font-weight:600;font-size:15px;color:var(--ink);letter-spacing:0}
.tk-day-sub{font-size:10.5px;color:var(--ink-3);font-weight:400;margin-top:2px;letter-spacing:0}
.tk-add-btn{
  background:linear-gradient(135deg,var(--tk-green) 0%,var(--tk-green-deep) 100%);
  color:#fff;border:none;border-radius:10px;
  padding:8px 14px;font-weight:600;font-size:11.5px;cursor:pointer;letter-spacing:0.2px;
  box-shadow:0 2px 6px rgba(79,74,67,.24),0 0 0 0.5px rgba(79,74,67,.10);
}
.tk-add-btn:active{transform:scale(.96)}
.tk-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border:1px solid var(--line);
  border-radius:12px;background:var(--card);
  margin-bottom:8px;transition:all .15s;
}
.tk-item.tk-done{opacity:.58}
.tk-item.tk-done:not(.tk-transfer) .tk-item-title{text-decoration:line-through;color:var(--ink-3)}
.tk-item.tk-transfer.tk-done{opacity:.9}
.tk-item.tk-transfer.tk-done .tk-item-title{text-decoration:none;color:var(--ink)}
.tk-item-check{
  width:22px;height:22px;border-radius:7px;
  border:1.8px solid var(--line-strong);
  background:#fff;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:transparent;font-weight:900;
  transition:all .15s;
}
.tk-item-check.tk-checked{
  background:linear-gradient(135deg,var(--tk-green) 0%,var(--tk-green-deep) 100%);
  border-color:var(--tk-green-deep);color:#fff;
}
.tk-item-body{flex:1;min-width:0}
.tk-item-row1{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px;
}
.tk-item-time{
  font-weight:600;font-size:11.5px;color:var(--tk-green-deep);
  font-variant-numeric:tabular-nums;letter-spacing:0;
  background:var(--tk-green-pale);padding:2px 7px;border-radius:6px;
}
.tk-item-title{
  font-weight:500;font-size:13px;color:var(--ink);line-height:1.35;
  word-break:break-word;letter-spacing:0;
}
.tk-item-sub{
  font-size:11px;color:var(--ink-3);font-weight:400;
  margin-top:3px;line-height:1.4;
  word-break:break-word;letter-spacing:0;
}
.tk-item-tag{
  display:inline-block;
  font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:6px;
  letter-spacing:.4px;text-transform:uppercase;
  margin-left:4px;
}
.tk-item-tag.tk-tag-transfer{background:#F2EFEA;color:#8A8378;border:1px solid #D8D0C6}
.tk-item-tag.tk-tag-todo{background:#FFF5E5;color:#C46D00;border:1px solid #FFD69A}
.tk-item-tag.tk-tag-event{background:#F2EFEA;color:#8A8378;border:1px solid #D8D0C6}
.tk-item-del{
  background:none;border:none;color:var(--ink-4);
  font-size:18px;cursor:pointer;padding:0 4px;
  flex-shrink:0;
}
.tk-item-del:active{color:var(--err)}
.tk-empty{
  text-align:center;padding:18px 14px;
  font-size:12.5px;color:var(--ink-3);font-weight:600;
  background:var(--surface);border:1px dashed var(--line);
  border-radius:12px;
}

/* Ledger items */
.tk-ledger{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border:1px solid var(--line);
  border-radius:12px;background:var(--card);
  margin-bottom:6px;
}
.tk-ledger.tk-ledger-done{opacity:.62}
.tk-ledger.tk-ledger-done .tk-ledger-name{text-decoration:none}
.tk-ledger-check{
  width:22px;height:22px;border-radius:7px;
  border:1.8px solid var(--line-strong);
  background:#fff;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:transparent;font-weight:900;
  transition:all .15s;
}
.tk-ledger-check.tk-checked{
  background:linear-gradient(135deg,var(--ok) 0%,var(--tk-green-deep) 100%);
  border-color:var(--ok);color:#fff;
}
.tk-ledger-body{flex:1;min-width:0}
.tk-ledger-name{font-weight:500;font-size:12.5px;color:var(--ink);line-height:1.3;word-break:break-word;letter-spacing:0}
.tk-ledger-sub{font-size:10.5px;color:var(--ink-3);font-weight:400;margin-top:2px;letter-spacing:0}
.tk-ledger-amt{font-weight:600;font-size:13.5px;font-variant-numeric:tabular-nums;letter-spacing:0;flex-shrink:0;white-space:nowrap}
.tk-ledger-amt.tk-amt-in{color:var(--ok)}
.tk-ledger-amt.tk-amt-out{color:var(--err)}

.tk-section-h{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px solid var(--line);
}
.tk-section-bar{display:inline-block;width:4px;height:16px;border-radius:2px}
.tk-section-bar.tk-bar-in{background:var(--ok)}
.tk-section-bar.tk-bar-out{background:var(--err)}
.tk-section-title{font-weight:600;font-size:11.5px;letter-spacing:.8px;text-transform:uppercase}
.tk-section-title.tk-tt-in{color:var(--ok)}
.tk-section-title.tk-tt-out{color:var(--err)}
.tk-section-count{
  margin-left:auto;font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:9px;letter-spacing:0.2px;
}
.tk-section-count.tk-cn-in{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
.tk-section-count.tk-cn-out{background:#FFF0EF;color:var(--err);border:1px solid #FFC4C0}

/* Takvim form modal */
.tk-form-grp{margin-bottom:14px}
.tk-form-lbl{
  font-size:10.5px;font-weight:600;color:var(--ink-3);
  letter-spacing:.8px;text-transform:uppercase;
  display:block;margin-bottom:6px;
}
.tk-type-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px;
}
.tk-type-opt{
  background:var(--surface);border:1.5px solid var(--line);
  border-radius:11px;padding:10px 6px;text-align:center;cursor:pointer;
  transition:all .15s;
}
.tk-type-opt.sel{
  background:linear-gradient(135deg,var(--tk-green-pale) 0%,var(--tk-green-paler) 100%);
  border-color:var(--tk-green);box-shadow:0 0 0 2px rgba(18,108,55,.28);
}
.tk-type-opt-icon{font-size:18px;margin-bottom:3px}
.tk-type-opt-lbl{font-size:11px;font-weight:600;color:var(--ink)}
.tk-type-opt.sel .tk-type-opt-lbl{color:var(--tk-green-deep)}
.tk-mini-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}
.tk-mini-btn{
  min-width:28px;height:28px;border:none;border-radius:8px;
  background:var(--surface);color:var(--ink-2);
  font-size:11px;font-weight:800;padding:0 8px;
}
.tk-mini-btn.is-titanium{background:var(--brand-softer);color:var(--brand);border:1px solid var(--brand-bd)}
.tk-mini-btn.is-green{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
.tk-mini-btn.is-red{background:var(--err-bg);color:var(--err);border:1px solid var(--err-bd)}
.tk-chip-row{display:flex;gap:7px;flex-wrap:wrap}
.tk-color-swatch{

}
.tk-color-swatch.sel{border-color:var(--ink);box-shadow:0 0 0 2px rgba(255,255,255,.95),0 0 0 4px var(--brand-bd)}
.tk-audit-toggle{

  padding:12px 14px;color:var(--ink);font-size:13px;font-weight:900;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
}
.tk-audit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media (max-width:720px){.tk-audit-grid{grid-template-columns:1fr}}

.tk-widget-page{gap:14px}
.tk-widget-board{
  display:grid;
  grid-template-columns:minmax(0,1.45fr) minmax(280px,.95fr);
  gap:12px;
  align-items:start;
}
.tk-widget-stack{display:flex;flex-direction:column;gap:10px;min-width:0}
.tk-panel{
  background:linear-gradient(180deg,rgba(255,255,255,.94) 0%,rgba(249,249,251,.94) 100%);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 12px 26px rgba(0,0,0,.055);
  min-width:0;
}
.tk-panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.tk-panel-kicker{
  display:inline-flex;align-items:center;gap:6px;
  min-height:24px;padding:4px 9px;border-radius:8px;
  font-size:10px;font-weight:800;letter-spacing:.45px;text-transform:uppercase;
  background:var(--brand-softer);color:var(--brand);border:1px solid var(--brand-bd);
}
.tk-panel-kicker.is-muted{background:var(--surface);color:var(--ink-2);border-color:var(--line)}
.tk-panel-date{font-size:12px;color:var(--ink-3);font-weight:600;margin-top:5px;line-height:1.25}
.tk-panel-count{
  min-width:30px;height:30px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--line);
  color:var(--ink-2);font-size:12px;font-weight:900;font-variant-numeric:tabular-nums;
}
.tk-panel-action{
  background:var(--brand);color:#fff;border:none;border-radius:10px;
  padding:8px 11px;font-size:11px;font-weight:800;
  box-shadow:0 6px 14px rgba(79,74,67,.18);
}
.tk-panel-list{display:flex;flex-direction:column;gap:8px}
.tk-panel-list .tk-item,.tk-panel-list .tk-ledger{margin-bottom:0}
.tk-panel-empty{
  background:var(--surface);border:1px dashed var(--line-2);
  border-radius:12px;padding:16px 12px;color:var(--ink-3);
  font-size:12px;font-weight:700;text-align:center;
}
.tk-widget-ledger-total{font-size:14px;font-weight:900;font-variant-numeric:tabular-nums;white-space:nowrap}
.tk-widget-ledger-total.is-in{color:var(--ok)}
.tk-widget-ledger-total.is-out{color:var(--err)}
@media (max-width:720px){
  .tk-widget-board{grid-template-columns:1fr}
}

/* ═══════════════════════════════════════════════════════════════
   OLMEZTUR ZERO VISUAL RESET — Apple Nude Corporate
   Görsel katman sıfırlandı, veri ve hesap mantığına dokunmaz.
   ═══════════════════════════════════════════════════════════════ */
:root{
  --bg:#FFFFFF;
  --bg-2:#FFFFFF;
  --card:#FFFFFF;
  --card-2:#FFFFFF;
  --surface:#FFFFFF;
  --surface-2:#F7F8F8;
  --line:#DED8D0;
  --line-2:#C9C1B8;
  --line-strong:#B6ADA1;
  --ink:#1F1D1A;
  --ink-2:#38342F;
  --ink-3:#6E665E;
  --ink-4:#9B9187;
  --brand:#8A8378;
  --brand-2:#4F4A43;
  --brand-3:#B6ADA1;
  --brand-soft:#FFFFFF;
  --brand-softer:#FFFFFF;
  --brand-bd:#D8D0C6;
  --nude:#B6ADA1;
  --nude-deep:#6E665E;
  --nude-soft:#FFFFFF;
  --nude-glow:#DED8D0;
  --ok:#126C37; --ok-bg:#E3F1E7; --ok-bd:#7DB68B;
  --warn:#B8863B; --warn-bg:#FFF7EA; --warn-bd:#E8C988;
  --err:#B95A54; --err-bg:#FFF1EF; --err-bd:#E3B8B4;
  --info:#8A8378; --info-bg:#FFFFFF; --info-bd:#D8D0C6;
  --t-arrival-bg:#F2EFEA; --t-arrival-bd:#D8D0C6;
  --t-departure-bg:#F2EFEA; --t-departure-bd:#D8D0C6;
  --t-tour-bg:#F2EFEA; --t-tour-bd:#D8D0C6;
  --t-intercity-bg:#FFF7EA; --t-intercity-bd:#E8C988;
  --tabbar-h:82px;
}
html,body{
  background:linear-gradient(180deg,#FFFFFF 0%,#FFFFFF 100%);
}
#root{
  background:transparent;
}
.app-shell{
  background:transparent!important;
  min-height:100%;
}
.hdr{
  background:rgba(250,248,245,.82);
  border-bottom:1px solid rgba(216,208,198,.76);
  box-shadow:0 18px 42px rgba(79,74,67,.08);
}
.hdr-inner{
  max-width:1180px;
  padding:14px 18px 16px;
  gap:13px;
}
.avatar-ring{
  width:50px;height:50px;border-radius:16px;
  padding:0;
  overflow:hidden;
  background:#fff;
  border:1px solid rgba(216,208,198,.92);
  box-shadow:0 12px 28px rgba(79,74,67,.15),inset 0 1px 0 rgba(255,255,255,.95);
}
.avatar-logo{
  width:100%;height:100%;display:block;object-fit:cover;
}
.avatar-mark{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#FFFFFF 0%,#F2EFEA 100%);
  color:var(--brand-2);
  font-size:17px;font-weight:620;letter-spacing:0;
}
.avatar-inner{display:none}
.hdr-title{
  font-size:17px;font-weight:620;color:var(--ink);letter-spacing:0;line-height:1.1;
}
.hdr-subtitle{
  font-size:10.5px;font-weight:500;color:var(--brand);letter-spacing:.18px;margin-top:3px;
}
.hdr-status{
  right:-4px;bottom:-4px;width:15px;height:15px;
  border:2.5px solid #fff;
}
.hdr-status-on{background:var(--brand)}
.hdr-iconbtn{
  width:44px;height:44px;border-radius:14px;
  background:linear-gradient(180deg,#FFFFFF,#F6F3EF);
  border:1px solid var(--brand-bd);
  color:var(--brand);
  box-shadow:0 10px 24px rgba(79,74,67,.10),inset 0 1px 0 rgba(255,255,255,.95);
}
main.main-cont{
  max-width:1180px;
  padding:16px 16px calc(var(--tabbar-h) + var(--sa-b) + 24px);
}
.card{
  background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,255,255,.78));
  border:1px solid rgba(216,208,198,.9);
  border-radius:16px;
  box-shadow:0 18px 44px rgba(79,74,67,.08),0 1px 1px rgba(255,255,255,.9) inset;
  backdrop-filter:saturate(1.35) blur(22px);
  -webkit-backdrop-filter:saturate(1.35) blur(22px);
}
.inp{
  min-height:48px;
  background:linear-gradient(180deg,#FFFFFF,rgba(255,255,255,.78));
  border:1px solid var(--line);
  border-radius:12px;
  color:var(--ink);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
}
.inp:focus{
  border-color:var(--brand);
  box-shadow:0 0 0 4px rgba(79,74,67,.14),inset 0 1px 0 rgba(255,255,255,.95);
}
.lbl{
  color:var(--ink-3);
  letter-spacing:.55px;
}
.toast{
  background:rgba(24,33,42,.92);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 18px 44px rgba(24,33,42,.26);
}
.qa-scroll,.hero-scroll{
  margin-left:-16px;margin-right:-16px;
}
.qa-row{gap:12px}
.qa-item{width:66px;gap:6px}
.qa-circle{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(180deg,#FFFFFF,rgba(255,255,255,.78));
  border:1px solid var(--brand-bd);
  color:var(--brand);
  box-shadow:0 14px 30px rgba(79,74,67,.10),inset 0 1px 0 rgba(255,255,255,.95);
}
.qa-circle-red,.qa-circle-dark{
  background:linear-gradient(145deg,var(--brand),var(--brand-2));
  border-color:rgba(79,74,67,.65);
  color:#fff;
  box-shadow:0 18px 36px rgba(79,74,67,.22),inset 0 1px 0 rgba(255,255,255,.22);
}
.qa-circle-red-soft,.qa-circle-nude,.qa-circle-vehicle{
  background:linear-gradient(180deg,#FFFFFF,rgba(255,255,255,.78));
  border-color:var(--brand-bd);
  color:var(--brand);
}
.qa-label{
  color:var(--ink-2);
  font-weight:550;
  font-size:10.5px;
}
.qa-badge{
  background:linear-gradient(145deg,var(--brand),var(--brand-2));
  box-shadow:0 6px 14px rgba(79,74,67,.26);
}
.hero-scroll{gap:12px}
.hero-card{
  border-radius:16px;
  width:252px;
  min-height:136px;
  padding:15px 16px;
  box-shadow:0 22px 54px rgba(79,74,67,.12),inset 0 1px 0 rgba(255,255,255,.35);
}
.hero-card-red{
  background:linear-gradient(145deg,#4F4A43 0%,#8A8378 58%,#B6ADA1 130%);
}
.hero-card-nude,.hero-card-ivory{
  background:linear-gradient(180deg,#FFFFFF 0%,rgba(255,255,255,.76) 100%);
  border-color:var(--brand-bd);
}
.hero-card-softred{
  background:linear-gradient(145deg,#FFFFFF 0%,rgba(255,255,255,.76) 100%);
  border-color:var(--brand-bd);
  color:var(--brand);
}
.hero-label{letter-spacing:.65px}
.hero-label{font-weight:550}
.hero-value{font-size:22px;font-weight:620}
.hero-hint{font-size:11.5px;font-weight:450}
.section-hd{
  padding:8px 2px 7px;
}
.section-hd-title{
  font-size:16px;font-weight:620;color:var(--ink);
}
.section-hd-action{
  color:var(--brand);
  background:rgba(242,239,234,.78);
  border:1px solid var(--brand-bd);
  border-radius:11px;
  padding:7px 10px;
}
.date-hdr{
  border-radius:14px;
  padding:10px 15px;
  background:linear-gradient(145deg,#4F4A43 0%,#8A8378 62%,#B6ADA1 130%);
  box-shadow:0 20px 48px rgba(79,74,67,.20),inset 0 1px 0 rgba(255,255,255,.18);
}
.date-hdr::before{
  width:0;
}
.date-hdr-txt{letter-spacing:.6px}
.tcard{
  border-radius:16px;
  border:1px solid rgba(216,208,198,.92);
  background:linear-gradient(180deg,#FFFFFF,rgba(255,255,255,.76));
  box-shadow:0 14px 34px rgba(79,74,67,.08),inset 0 1px 0 rgba(255,255,255,.9);
}
.tcard.is-open{
  border-color:rgba(79,74,67,.38);
  box-shadow:0 24px 60px rgba(79,74,67,.16);
}
.tcard-header{min-height:86px}
.tcard-stripe{width:5px}
.tcard.t-arrival .tcard-stripe,
.tcard.t-departure .tcard-stripe,
.tcard.t-tour .tcard-stripe{
  background:linear-gradient(180deg,var(--brand-3),var(--brand-2));
}
.tcard.t-intercity .tcard-stripe{
  background:linear-gradient(180deg,#C9A56C,#B8863B);
}
.tcard-body{padding:11px 12px;column-gap:9px;row-gap:5px}
.tcard-time{
  border-right:1px solid var(--line);
  min-width:54px;
}
.tcard-time-big{font-size:16px;color:var(--brand-2);font-weight:620}
.tcard-agency{font-weight:540;color:var(--ink)}
.tcard-route{color:var(--ink-2)}
.tcard-passenger{color:var(--ink-3)}
.tcard-amount{font-size:15px;color:var(--ok);font-weight:620}
.tcard-right{min-width:84px}
.tcard-pill{
  border-radius:9px;
  padding:4px 8px;
}
.tcard-pill-status-tam,.tcard-paystatus.is-paid{
  background:var(--ok-bg);color:var(--ok);border-color:var(--ok-bd);
}
.tcard-pill-status-bos,.tcard-paystatus.is-pending{
  background:var(--warn-bg);color:var(--warn);border-color:var(--warn-bd);
}
.tcard-expanded{
  background:linear-gradient(180deg,rgba(255,255,255,.80),#FFFFFF);
  border-top:1px solid var(--line);
}
.amt-pos{color:var(--ok)}
.amt-neg{color:var(--err)}
.tabbar{
  background:rgba(255,255,255,.76);
  border-top:1px solid rgba(216,208,198,.92);
  box-shadow:0 -18px 44px rgba(79,74,67,.10);
}
.tabbar-inner{
  max-width:620px;
  height:var(--tabbar-h);
  padding:8px 8px 10px;
  gap:6px;
}
.tab{
  border-radius:15px;
  color:var(--ink-3);
  font-weight:550;
  min-height:60px;
}
.tab-icon{
  height:25px;min-width:25px;
  font-size:21px;
  line-height:25px;
  font-weight:600;
  letter-spacing:0;
}
.tab.is-active{
  background:linear-gradient(180deg,#FFFFFF,rgba(255,255,255,.72));
  color:var(--brand-2);
  box-shadow:0 10px 24px rgba(79,74,67,.10),inset 0 1px 0 rgba(255,255,255,.95);
}
.tab.is-active::before{
  width:24px;height:3px;top:5px;
  background:linear-gradient(90deg,var(--brand-3),var(--brand-2));
}
.tab-fab{
  width:52px;height:52px;border-radius:17px;
  background:linear-gradient(145deg,var(--brand),var(--brand-2));
  box-shadow:0 18px 36px rgba(79,74,67,.26),inset 0 1px 0 rgba(255,255,255,.22),0 0 0 1px rgba(255,255,255,.92);
}
.mo{
  background:rgba(24,33,42,.42);
}
.ms{
  border:1px solid rgba(216,208,198,.9);
  background:linear-gradient(180deg,#FFFFFF,rgba(255,255,255,.78));
  box-shadow:0 -28px 70px rgba(24,33,42,.24);
}
@media (min-width:900px){
  .hdr-inner{padding-left:24px;padding-right:24px}
  main.main-cont{max-width:1180px!important;padding:22px 24px calc(var(--tabbar-h) + 42px)!important}
  .desk-grid{gap:16px}
  .desk-3{gap:16px}
  .hero-card{width:286px}
  .tabbar-inner{max-width:640px}
}
@media (max-width:520px){
  .hdr-inner{padding-left:15px;padding-right:15px}
  main.main-cont{padding-top:12px}
  .hero-card{width:246px;min-height:132px}
  .hero-scroll{gap:10px;padding-bottom:12px}
  .qa-scroll{padding-top:4px;padding-bottom:10px}
  .qa-row{gap:10px}
  .qa-item{width:62px}
  .qa-circle{width:54px;height:54px}
  .tab-label{font-size:9.6px}
}

.app-shell [style*="font-weight: 900"]{font-weight:660!important}
.app-shell [style*="font-weight: 800"]{font-weight:620!important}
.app-shell [style*="font-weight: 700"]{font-weight:540!important}
.app-shell [style*="font-weight: 600"]{font-weight:500!important}
.app-shell [style*="font-weight: bold"]{font-weight:560!important}

/* Liquid Glass home - Apple premium direction */
:root{
  --lg-page:#F4F1EC;
  --lg-page-2:#E7ECEF;
  --lg-ink:#17181A;
  --lg-muted:#77736C;
  --lg-soft:#A19A90;
  --lg-line:rgba(134,128,119,.24);
  --lg-glass:rgba(255,255,255,.52);
  --lg-glass-strong:rgba(255,255,255,.72);
  --lg-shadow:0 22px 54px rgba(56,52,46,.14),0 2px 9px rgba(56,52,46,.08);
  --lg-inner:inset 0 1px 0 rgba(255,255,255,.76),inset 0 -1px 0 rgba(255,255,255,.28);
}
html,body{
  background:
    radial-gradient(circle at 20% 9%,rgba(255,255,255,.94) 0 17%,rgba(255,255,255,0) 42%),
    radial-gradient(circle at 80% 4%,rgba(255,255,255,.76) 0 18%,rgba(255,255,255,0) 42%),
    linear-gradient(145deg,#FFFFFF 0%,#FFFFFF 100%)!important;
}
.app-shell{
  background:
    linear-gradient(132deg,rgba(255,255,255,.72),rgba(255,255,255,.46) 45%,rgba(255,255,255,.62)),
    #FFFFFF!important;
  color:var(--lg-ink);
}
main.main-cont{
  max-width:402px!important;
  padding:calc(var(--sa-t) + 8px) 12px calc(var(--tabbar-h) + 24px)!important;
}
.hdr{
  display:none!important;
}
.hdr-inner{
  max-width:402px!important;
  margin:0 auto!important;
  padding:10px 16px 8px!important;
  background:transparent!important;
  border:0!important;
  box-shadow:none!important;
}
.avatar-ring{display:none!important}
.hdr-title{
  font-size:18px!important;
  line-height:1.08!important;
  font-weight:640!important;
  letter-spacing:0!important;
  color:var(--lg-ink)!important;
}
.hdr-subtitle{
  font-size:10.5px!important;
  font-weight:450!important;
  color:var(--lg-muted)!important;
  margin-top:3px!important;
  letter-spacing:0!important;
}
.hdr-subtitle + div{display:none!important}
.hdr-iconbtn{
  width:34px!important;
  height:34px!important;
  border-radius:14px!important;
  border:1px solid rgba(255,255,255,.54)!important;
  background:rgba(255,255,255,.30)!important;
  color:var(--lg-ink)!important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.64),0 8px 22px rgba(63,58,52,.10)!important;
  backdrop-filter:saturate(1.5) blur(18px)!important;
  -webkit-backdrop-filter:saturate(1.5) blur(18px)!important;
}
.card,.inp,.ms{
  backdrop-filter:saturate(1.55) blur(22px);
  -webkit-backdrop-filter:saturate(1.55) blur(22px);
}
.lg-home{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-top:2px;
}
.lg-glass-card,
.lg-metric-card,
.lg-upcoming-card,
.lg-action,
.lg-rate-card,
.lg-period-card,
.lg-profit-card{
  background:linear-gradient(148deg,rgba(255,255,255,.68),rgba(255,255,255,.38) 52%,rgba(233,239,242,.42));
  border:1px solid rgba(255,255,255,.56);
  box-shadow:var(--lg-shadow),var(--lg-inner);
  backdrop-filter:saturate(1.65) blur(26px);
  -webkit-backdrop-filter:saturate(1.65) blur(26px);
}
.lg-greeting-card{
  border-radius:16px;
  padding:13px 14px;
  min-height:76px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  overflow:hidden;
  position:relative;
}
.lg-greeting-card:after{
  content:"";
  position:absolute;
  inset:-24% -12% auto 38%;
  height:118px;
  background:linear-gradient(120deg,rgba(255,255,255,.74),rgba(255,255,255,0));
  transform:rotate(16deg);
  pointer-events:none;
}
.lg-eyebrow{
  font-size:10.5px;
  color:var(--lg-muted);
  font-weight:520;
  letter-spacing:0;
  line-height:1.2;
}
.lg-greeting-title{
  margin-top:5px;
  font-size:14px;
  color:var(--lg-ink);
  font-weight:620;
  letter-spacing:0;
}
.lg-date{
  margin-top:3px;
  font-size:10.5px;
  color:var(--lg-muted);
  font-weight:430;
  letter-spacing:0;
}
.lg-weather{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:7px;
  padding:7px 9px;
  border-radius:13px;
  background:rgba(255,255,255,.38);
  border:1px solid rgba(255,255,255,.54);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.74);
  position:relative;
  z-index:1;
}
.lg-greeting-tools{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:7px;
  position:relative;
  z-index:1;
  flex:0 0 auto;
}
.lg-backup-btn{
  min-height:25px;
  border-radius:12px;
  padding:5px 9px;
  border:1px solid rgba(255,255,255,.56);
  background:rgba(255,255,255,.34);
  color:var(--lg-ink);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.66),0 8px 18px rgba(56,52,46,.10);
  font-size:9.5px;
  font-weight:540;
  backdrop-filter:saturate(1.55) blur(18px);
  -webkit-backdrop-filter:saturate(1.55) blur(18px);
}
.lg-tools-row{
  display:flex;
  align-items:center;
  gap:6px;
}
.lg-refresh-btn{
  width:26px;
  height:25px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.56);
  background:rgba(255,255,255,.34);
  color:var(--lg-ink);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.66),0 8px 18px rgba(56,52,46,.10);
  font-size:12px;
  font-weight:560;
}
.lg-inline-rates{
  display:flex;
  align-items:center;
  gap:5px;
  margin-top:9px;
  flex-wrap:wrap;
}
.lg-inline-rate{
  min-height:22px;
  border-radius:11px;
  padding:4px 7px;
  background:rgba(255,255,255,.36);
  border:1px solid rgba(255,255,255,.52);
  color:var(--lg-ink);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.62);
  font-size:9px;
  font-weight:560;
  white-space:nowrap;
}
.lg-weather-mark{
  width:22px;height:22px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#FFE7A4,#FFFFFF 64%,#BFD6E4);
  color:#3B3A37;
  font-size:12px;
  box-shadow:0 5px 14px rgba(141,122,84,.18);
}
.lg-weather-main{
  font-size:13px;
  color:var(--lg-ink);
  font-weight:620;
  line-height:1;
  font-variant-numeric:tabular-nums;
}
.lg-weather-sub{
  margin-top:3px;
  font-size:9.5px;
  color:var(--lg-muted);
  font-weight:430;
  line-height:1;
}
.lg-rate-row{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:7px;
}
.lg-rate-card{
  border-radius:13px;
  padding:8px 9px;
  min-height:50px;
  text-align:left;
  color:var(--lg-ink);
}
.lg-rate-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  color:var(--lg-muted);
  font-size:9.5px;
  font-weight:560;
  letter-spacing:0;
}
.lg-rate-val{
  margin-top:5px;
  color:var(--lg-ink);
  font-size:12.5px;
  font-weight:620;
  font-variant-numeric:tabular-nums;
  letter-spacing:0;
}
.lg-section-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-top:2px;
}
.lg-section-title{
  color:var(--lg-ink);
  font-size:12.5px;
  font-weight:620;
  letter-spacing:0;
}
.lg-link-btn{
  border:0;
  background:transparent;
  color:var(--lg-muted);
  font-size:10.5px;
  font-weight:520;
  padding:5px 0;
}
.lg-badge{
  min-width:24px;
  height:18px;
  padding:0 7px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:rgba(255,255,255,.48);
  border:1px solid rgba(255,255,255,.56);
  color:var(--lg-ink);
  font-size:10px;
  font-weight:560;
  font-variant-numeric:tabular-nums;
}
.lg-metric-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
}
.lg-metric-card{
  border-radius:15px;
  padding:12px 10px 11px;
  min-height:88px;
}
.lg-metric-label{
  color:var(--lg-muted);
  font-size:9.5px;
  font-weight:520;
  line-height:1.2;
  letter-spacing:0;
}
.lg-metric-value{
  margin-top:8px;
  color:var(--lg-ink);
  font-size:17px;
  font-weight:630;
  line-height:1;
  letter-spacing:0;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}
.lg-metric-delta{
  margin-top:7px;
  color:#247145;
  font-size:9.5px;
  font-weight:520;
  letter-spacing:0;
  white-space:nowrap;
}
.lg-metric-muted{color:var(--lg-muted)}
.lg-period-row{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
}

    function installStyle(){
        let style = document.getElementById(STYLE_ID);
        if (!style) {
            style = document.createElement('style');
            style.id = STYLE_ID;
            document.head.appendChild(style);
        }
        style.textContent = STYLE;
    }

    function appRoot(){
        return document.querySelector('.app-shell') || document.querySelector('.auth-shell') || document.body;
    }

    function closestTarget(node){
        if (!node || !node.closest) return null;
        const root = appRoot();
        const tab = node.closest('.tabbar .tab:not(.tab-fab)');
        if (tab && root && root.contains(tab)) return tab.querySelector('.tab-icon') || tab;
        const el = node.closest(TARGET);
        if (el && root && root.contains(el)) return el;
        let cur = node.nodeType === 1 ? node : node.parentElement;
        while (cur && cur !== document.body) {
            const inline = cur.getAttribute ? (cur.getAttribute('style') || '') : '';
            if (/cursor\s*:\s*pointer/i.test(inline)) return cur;
            cur = cur.parentElement;
        }
        return null;
    }

    function press(el){
        if (!el || el.matches('[disabled]')) return;
        el.classList.add('ko-pressing', 'ko-click-confirmed');
        window.clearTimeout(el.__koPremiumTimer);
        el.__koPremiumTimer = window.setTimeout(() => {
            el.classList.remove('ko-pressing', 'ko-click-confirmed');
        }, 620);
    }

    installStyle();
    document.addEventListener('pointerdown', e => press(closestTarget(e.target)), { capture: true, passive: true });
    document.addEventListener('click', e => {
        const el = closestTarget(e.target);
        press(el);
    }, { capture: true, passive: true });
    document.addEventListener('focusin', e => press(closestTarget(e.target)), true);

    function installMoneyTapStyle(){

    const SIGNED_TL_RE = /(?:^|[\\s:])([+−-])\\s*[\\d.]+(?:,\\d+)?\\s*₺/;
    function classifyMoneyText(text){
        const s = String(text || '').replace(/\\u2212/g, '−').trim();
        const m = s.match(SIGNED_TL_RE);

        return m[1] === '+' ? 'pos' : 'neg';

    function markMoney(){
        document.querySelectorAll('main.main-cont .ko-money-pos:not(.ko-money-token):not(.ko-transfer-net-box),main.main-cont .ko-money-neg:not(.ko-money-token):not(.ko-transfer-net-box)').forEach(el => {

    const homeTouches = new Map();
    function homeCardFromTarget(target){
        return target && target.closest ? target.closest('.lg-home .lg-period-card,.lg-home .lg-profit-card') : null;
    }
    function clearHomePress(card){
        if (!card) return;
        card.classList.remove('ko-gold-hit','ko-click-confirmed','ko-pressing','ko-home-real-tap');
    }
    document.addEventListener('pointerdown', e => {
        const card = homeCardFromTarget(e.target);
        if (!card) return;
        homeTouches.set(e.pointerId, { card, x:e.clientX, y:e.clientY, moved:false });
        requestAnimationFrame(() => clearHomePress(card));
    }, { capture: true, passive: true });
    document.addEventListener('pointermove', e => {
        const rec = homeTouches.get(e.pointerId);
        if (!rec) return;
        if (Math.abs(e.clientX - rec.x) > 8 || Math.abs(e.clientY - rec.y) > 8) {
            rec.moved = true;
            clearHomePress(rec.card);
        }
    }, { capture: true, passive: true });
    document.addEventListener('pointerup', e => {
        const rec = homeTouches.get(e.pointerId);

        homeTouches.delete(e.pointerId);

    function installGlobalMoneyStyle(){
        let style = document.getElementById(GLOBAL_MONEY_STYLE_ID);

            style.id = GLOBAL_MONEY_STYLE_ID;

        }
        style.textContent = GLOBAL_MONEY_STYLE;
    }

    const POS = '#3f806d';
    const NEG = '#b2605c';
    const CURRENCY_RE = /(₺|TL|TRY)/i;
    const SIGNED_MONEY_RE = /([+−-])\s*([0-9][0-9.]*)(,[0-9]+)?\s*(₺|TL|TRY)?/g;

    function escapeHtml(s){
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function tokenStyle(kind){
        const color = kind === 'pos' ? POS : NEG;
        return 'color:' + color + ' !important;-webkit-text-fill-color:' + color + ' !important;font-weight:430 !important;';
    }

    function moneyHtml(text){
        const raw = String(text || '');
        if (!/[+−-]\s*[0-9]/.test(raw) || !CURRENCY_RE.test(raw)) return null;
        let out = '';
        let last = 0;
        let found = false;
        SIGNED_MONEY_RE.lastIndex = 0;
        let m;
        while ((m = SIGNED_MONEY_RE.exec(raw))) {
            const token = m[0];
            if (!CURRENCY_RE.test(token) && !CURRENCY_RE.test(raw.slice(m.index, m.index + token.length + 3))) continue;
            const sign = m[1];
            const kind = sign === '+' ? 'pos' : 'neg';
            out += escapeHtml(raw.slice(last, m.index));
            out += '<span class="ko-money-token ko-money-' + kind + '" data-ko-money-token="1" style="' + tokenStyle(kind) + '">' + escapeHtml(token) + '</span>';
            last = m.index + token.length;
            found = true;
        }
        if (!found) return null;
        out += escapeHtml(raw.slice(last));
        return out;
    }

    function forceTokenColor(token){
        const isNeg = token.classList.contains('ko-money-neg');
        const color = isNeg ? NEG : POS;
        token.style.setProperty('color', color, 'important');
        token.style.setProperty('-webkit-text-fill-color', color, 'important');
        token.style.setProperty('font-weight', '430', 'important');
        token.style.setProperty('font-variant-numeric', 'tabular-nums', 'important');
        token.style.setProperty('text-shadow', 'none', 'important');
    }

    function shouldSkip(el){
        if (!el || !el.closest) return true;
        if (el.closest('script,style,textarea,input,select,option,.ko-money-token')) return true;
        return false;
    }

    function processLeaf(el){
        if (shouldSkip(el)) return;
        if (el.children && el.children.length) return;
        const text = el.textContent || '';
        const html = moneyHtml(text);
        if (!html) return;
        if (el.getAttribute('data-ko-money-source') === text) return;
        el.setAttribute('data-ko-money-source', text);
        el.innerHTML = html;
    }

    function markNetBoxes(root){
        (root || document).querySelectorAll('main.main-cont.view-list .tcard-expanded div').forEach(box => {
            if (box.closest('.ko-money-token')) return;
            const txt = box.textContent || '';

(function(){
    const HOME_TODAY_PRESS_GUARD_ID = 'ko-home-today-scroll-press-guard-v1';
    if (window[HOME_TODAY_PRESS_GUARD_ID]) return;
    window[HOME_TODAY_PRESS_GUARD_ID] = true;

    const CARD_SELECTOR = '.lg-home-transfer-list.lg-today-list-standalone .lg-upcoming-card';
    const PRESS_CLASSES = ['ko-gold-hit','ko-simple-gold-frame','ko-click-confirmed','ko-pressing'];
    const STATE_CLASSES = ['ko-scroll-guard-active','ko-scroll-guard-moving','ko-home-real-tap'];
    const touches = new Map();
    let suppressClickUntil = 0;

    function cardFromTarget(target){
        return target && target.closest ? target.closest(CARD_SELECTOR) : null;
    }

    function clearPress(card){
        if (!card) return;
        card.classList.remove(...PRESS_CLASSES);
    }

    function clearAll(card){
        if (!card) return;
        card.classList.remove(...PRESS_CLASSES, ...STATE_CLASSES);
    }

    function clearSoon(card){
        clearPress(card);
        requestAnimationFrame(() => clearPress(card));
        setTimeout(() => clearPress(card), 90);
    }

    document.addEventListener('pointerdown', e => {
        const card = cardFromTarget(e.target);
        if (!card) return;
        const id = e.pointerId == null ? 1 : e.pointerId;
        touches.set(id, { card, x:e.clientX, y:e.clientY, moved:false });
        card.classList.add('ko-scroll-guard-active');
        clearSoon(card);
    }, { capture:true, passive:true });

    document.addEventListener('pointermove', e => {
        const id = e.pointerId == null ? 1 : e.pointerId;
        const rec = touches.get(id);
        if (!rec) return;
        if (Math.abs(e.clientX - rec.x) > 6 || Math.abs(e.clientY - rec.y) > 6) {
            rec.moved = true;
            suppressClickUntil = Date.now() + 500;
            rec.card.classList.add('ko-scroll-guard-moving');
            clearSoon(rec.card);
        }
    }, { capture:true, passive:true });

    document.addEventListener('pointerup', e => {
        const id = e.pointerId == null ? 1 : e.pointerId;
        const rec = touches.get(id);
        if (!rec) return;
        touches.delete(id);
        if (rec.moved) {
            clearAll(rec.card);
            return;
        }
        clearPress(rec.card);
        rec.card.classList.add('ko-home-real-tap');
        setTimeout(() => clearAll(rec.card), 190);
    }, { capture:true, passive:true });

    document.addEventListener('pointercancel', e => {
        const id = e.pointerId == null ? 1 : e.pointerId;
        const rec = touches.get(id);
        if (!rec) return;
        touches.delete(id);
        clearAll(rec.card);
    }, { capture:true, passive:true });

    document.addEventListener('click', e => {
        const card = cardFromTarget(e.target);
        if (!card) return;
        if (Date.now() < suppressClickUntil) {
            clearAll(card);
            return;
        }
        clearPress(card);
        card.classList.add('ko-home-real-tap');
        setTimeout(() => clearAll(card), 190);
    }, { capture:true, passive:true });

    document.addEventListener('scroll', () => {
        document.querySelectorAll(CARD_SELECTOR).forEach(clearAll);
    }, { capture:true, passive:true });
})();

(function(){
    const TABBAR_FORCE_CLEAN_ID = 'ko-force-tabbar-no-green-inline-v1';
    if (window[TABBAR_FORCE_CLEAN_ID]) return;
    window[TABBAR_FORCE_CLEAN_ID] = true;

    const set = (el, prop, value) => {
        if (el && el.style) el.style.setProperty(prop, value, 'important');
    };
    const nudeGreenLine = 'rgba(63,128,109,.46)';
    const clearGreenBar = () => {
        const root = document.querySelector('.app-shell');
        if (!root) return;
        const tabbar = root.querySelector('.tabbar');
        const inner = root.querySelector('.tabbar-inner');
        if (!tabbar || !inner) return;

        set(tabbar, 'background', 'transparent');
        set(tabbar, 'background-color', 'transparent');
        set(tabbar, 'box-shadow', 'none');
        set(tabbar, 'filter', 'none');
        set(tabbar, 'backdrop-filter', 'none');
        set(tabbar, '-webkit-backdrop-filter', 'none');

        set(inner, 'background', 'linear-gradient(180deg,rgba(255,255,255,.90),rgba(255,255,255,.70))');
        set(inner, 'background-color', 'rgba(255,255,255,.82)');
        set(inner, 'border', '1px solid rgba(24,31,38,.10)');
        set(inner, 'box-shadow', '0 10px 26px rgba(24,31,38,.085), inset 0 1px 0 rgba(255,255,255,.94)');
        set(inner, 'filter', 'none');
        set(inner, 'backdrop-filter', 'saturate(1.25) blur(22px)');
        set(inner, '-webkit-backdrop-filter', 'saturate(1.25) blur(22px)');

        root.querySelectorAll('.tabbar .tab, .tabbar button.tab').forEach(tab => {
            set(tab, 'background', 'transparent');
            set(tab, 'background-color', 'transparent');
            set(tab, 'border-color', 'transparent');
            set(tab, 'box-shadow', 'none');
            set(tab, 'filter', 'none');
            set(tab, 'color', tab.classList.contains('is-active') ? '#24302d' : '#66706b');
            set(tab, '-webkit-text-fill-color', tab.classList.contains('is-active') ? '#24302d' : '#66706b');
        });

        root.querySelectorAll('.tabbar .tab-icon').forEach(icon => {
            const tab = icon.closest('.tab');
            const active = !!(tab && tab.classList.contains('is-active'));
            set(icon, 'background', active ? 'linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.66))' : 'transparent');
            set(icon, 'background-color', active ? 'rgba(255,255,255,.74)' : 'transparent');
            set(icon, 'border', active ? '1.4px solid ' + nudeGreenLine : '1px solid transparent');
            set(icon, 'box-shadow', active ? '0 5px 14px rgba(24,31,38,.055), inset 0 1px 0 rgba(255,255,255,.92)' : 'none');
            set(icon, 'filter', 'none');
            set(icon, 'color', active ? '#24302d' : '#66706b');
            set(icon, '-webkit-text-fill-color', active ? '#24302d' : '#66706b');
        });

        root.querySelectorAll('.tabbar .tab-label').forEach(label => {
            const tab = label.closest('.tab');
            const active = !!(tab && tab.classList.contains('is-active'));
            set(label, 'color', active ? '#24302d' : '#66706b');
            set(label, '-webkit-text-fill-color', active ? '#24302d' : '#66706b');
            set(label, 'text-shadow', 'none');
            set(label, 'filter', 'none');
        });

        root.querySelectorAll('.tabbar .tab-fab, .tabbar button.tab-fab').forEach(fab => {
            set(fab, 'background', 'linear-gradient(180deg,rgba(255,255,255,.94),rgba(255,255,255,.72))');
            set(fab, 'background-color', 'rgba(255,255,255,.82)');
            set(fab, 'border', '1.4px solid ' + nudeGreenLine);
            set(fab, 'box-shadow', '0 9px 22px rgba(24,31,38,.10), inset 0 1px 0 rgba(255,255,255,.94)');
            set(fab, 'filter', 'none');
            set(fab, 'color', '#24302d');
            set(fab, '-webkit-text-fill-color', '#24302d');
        });

        root.querySelectorAll('.tabbar .tab-fab-plus').forEach(plus => {
            set(plus, 'background', 'transparent');
            set(plus, 'background-color', 'transparent');
            set(plus, 'border', '0');
            set(plus, 'box-shadow', 'none');
            set(plus, 'filter', 'none');
            set(plus, 'color', '#24302d');
            set(plus, '-webkit-text-fill-color', '#24302d');
        });
    };

    const schedule = () => {
        clearGreenBar();
        requestAnimationFrame(clearGreenBar);
        setTimeout(clearGreenBar, 80);
    };
    schedule();
    document.addEventListener('DOMContentLoaded', schedule, { once:true });
    document.addEventListener('click', e => {
        if (e.target && e.target.closest && e.target.closest('.tabbar')) schedule();
    }, true);
    document.addEventListener('pointerdown', e => {
        if (e.target && e.target.closest && e.target.closest('.tabbar')) schedule();
    }, true);
    const obsTarget = document.querySelector('.app-shell') || document.body;
    if (obsTarget && window.MutationObserver) {
        new MutationObserver(schedule).observe(obsTarget, { childList:true, subtree:true, attributes:true, attributeFilter:['class'] });
    }
    setInterval(clearGreenBar, 300);
})();

    let style = document.getElementById(FINAL_HESAP_ARAC_POLISH_ID);

        style.id = FINAL_HESAP_ARAC_POLISH_ID;

    }
    style.textContent = FINAL_HESAP_ARAC_POLISH;

    const setLightNumbers = () => {
        const root = document.querySelector('main.main-cont.view-arac');
        if (!root) return;
        root.querySelectorAll('.ko-money-token,.ko-money-currency,.ko-money-pos,.ko-money-neg').forEach(el => {
            el.style.setProperty('font-weight', '420', 'important');
            el.style.setProperty('font-variant-numeric', 'tabular-nums', 'important');
            el.style.setProperty('letter-spacing', '0', 'important');
            el.style.setProperty('text-shadow', 'none', 'important');
        });
        root.querySelectorAll('div,span,button,input').forEach(el => {
            const txt = (el.textContent || el.value || '').trim();
            if (!/[0-9]/.test(txt) && !/[₺]|TL|TRY/i.test(txt)) return;
            if (el.closest('.tabbar')) return;
            const current = Number(window.getComputedStyle(el).fontWeight) || 400;
            if (/[₺]|TL|TRY|[+−-]\s*\d|\d[\d.]*,\d/.test(txt) || current >= 600) {
                el.style.setProperty('font-weight', '420', 'important');
                el.style.setProperty('font-variant-numeric', 'tabular-nums', 'important');
                el.style.setProperty('letter-spacing', '0', 'important');
                el.style.setProperty('text-shadow', 'none', 'important');
            }
        });
    };
    const scheduleLightNumbers = () => {
        setLightNumbers();
        requestAnimationFrame(setLightNumbers);
        setTimeout(setLightNumbers, 80);
    };
    scheduleLightNumbers();
    document.addEventListener('click', scheduleLightNumbers, true);
    document.addEventListener('input', scheduleLightNumbers, true);
    const obsTarget = document.getElementById('root') || document.body;
    if (obsTarget && window.MutationObserver) {
        new MutationObserver(scheduleLightNumbers).observe(obsTarget, { childList:true, subtree:true, characterData:true, attributes:true, attributeFilter:['class'] });
    }
    setInterval(setLightNumbers, 250);
})();

`;
    let style = document.getElementById(NEW_TRANSFER_CHOICE_FRAME_ID);
    if (!style) {
        style = document.createElement('style');
        style.id = NEW_TRANSFER_CHOICE_FRAME_ID;
        document.head.appendChild(style);
    }
    style.textContent = css;

    const GREEN_LINE = '#2f6d58';
    const SOFT_LINE = 'rgba(42,74,61,.18)';
    const CLEAN_BG = 'linear-gradient(145deg,rgba(255,255,255,.99),rgba(255,255,255,.84) 60%,rgba(246,248,246,.70))';
    const SELECTED_SHADOW = '0 0 0 1px rgba(47,109,88,.16),0 9px 18px rgba(24,31,38,.045),inset 0 1px 0 rgba(255,255,255,.96)';
    const NORMAL_SHADOW = '0 7px 16px rgba(24,31,38,.035),inset 0 1px 0 rgba(255,255,255,.94)';
    const ACTIVE_CLASSES = ['is-active','active','is-selected','selected','ko-selected-gold','ko-sync-gold','ko-auto-selected','ko-gold-hit','ko-simple-gold-frame','ko-click-confirmed','ko-new-choice-confirmed'];

    const isSelectedChoice = btn => {
        if (!btn || !btn.classList) return false;
        if (ACTIVE_CLASSES.some(c => btn.classList.contains(c))) return true;
        if (btn.matches(':active,:focus,:focus-visible,[aria-selected="true"],[aria-pressed="true"],[aria-expanded="true"]')) return true;
        return false;
    };

    const paintChoice = btn => {
        const active = isSelectedChoice(btn);
        btn.style.setProperty('position', 'relative', 'important');
        btn.style.setProperty('background', CLEAN_BG, 'important');
        btn.style.setProperty('background-color', '#FFFFFF', 'important');
        btn.style.setProperty('border', active ? '1.35px solid ' + GREEN_LINE : '1px solid ' + SOFT_LINE, 'important');
        btn.style.setProperty('box-shadow', active ? SELECTED_SHADOW : NORMAL_SHADOW, 'important');
        btn.style.setProperty('outline', 'none', 'important');
        btn.style.setProperty('filter', 'none', 'important');
        btn.style.setProperty('color', active ? '#17231e' : '#1f2a25', 'important');
        btn.style.setProperty('-webkit-text-fill-color', active ? '#17231e' : '#1f2a25', 'important');
    };

    const paintAllChoices = () => {
        document.querySelectorAll('main.main-cont.view-new button.lg-choice').forEach(paintChoice);
    };

    let activeCard = null;
    let cardTimer = null;

    const markCard = node => {
        const card = node && node.closest && node.closest('main.main-cont.view-new .card');
        if (!card) return;
        if (activeCard && activeCard !== card) activeCard.classList.remove('ko-new-card-confirmed');
        activeCard = card;
        card.classList.add('ko-new-card-confirmed');
        clearTimeout(cardTimer);
        cardTimer = setTimeout(() => {
            if (activeCard && !activeCard.matches(':focus-within')) {
                activeCard.classList.remove('ko-new-card-confirmed');
                activeCard = null;
            }
        }, 1200);
    };

    const schedulePaint = () => {
        paintAllChoices();
        requestAnimationFrame(paintAllChoices);
        setTimeout(paintAllChoices, 80);
        setTimeout(paintAllChoices, 240);
    };

    document.addEventListener('pointerdown', e => {
        const btn = e.target && e.target.closest && e.target.closest('main.main-cont.view-new button.lg-choice');
        markCard(e.target);
        if (!btn) return;
        btn.classList.add('ko-new-choice-confirmed');
        paintChoice(btn);
        schedulePaint();
    }, true);

    document.addEventListener('click', e => {
        const btn = e.target && e.target.closest && e.target.closest('main.main-cont.view-new button.lg-choice');
        markCard(e.target);
        if (!btn) return;
        btn.classList.add('ko-new-choice-confirmed');
        paintChoice(btn);
        clearTimeout(btn.__koNewChoiceTimer);
        btn.__koNewChoiceTimer = setTimeout(() => {
            btn.classList.remove('ko-new-choice-confirmed');
            schedulePaint();
        }, 900);
        schedulePaint();
    }, true);

    document.addEventListener('focusin', e => {
        markCard(e.target);
        schedulePaint();
    }, true);
    document.addEventListener('input', schedulePaint, true);
    document.addEventListener('change', schedulePaint, true);
    document.addEventListener('DOMContentLoaded', schedulePaint, { once:true });
    const obsTarget = document.getElementById('root') || document.body;
    if (obsTarget && window.MutationObserver) {
        new MutationObserver(schedulePaint).observe(obsTarget, { childList:true, subtree:true, attributes:true, attributeFilter:['class','aria-selected','aria-pressed','aria-expanded'] });
    }
    schedulePaint();
})();
