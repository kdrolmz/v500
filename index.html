<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Transfer Bilgileri">
<meta name="theme-color" content="#3D5A3C">
<title>Transfer Bilgileri</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   TRANSFER BİLGİLERİ — PREMIUM KURUMSAL TASARIM SİSTEMİ v2.0
   iPhone first · Desktop uyumlu · Tek dil, tek ton
   ═══════════════════════════════════════════════════════════════ */

:root{
  /* — yüzeyler — SAGE PREMIUM (sakin yumuşak yeşil ton) — */
  --bg:#FAFBF9;           /* uygulama arka planı - krem beyaz */
  --bg-2:#F2F5F1;         /* alternatif - hafif yeşilimsi nude */
  --card:#FFFFFF;         /* ana kart - saf beyaz */
  --card-2:#F8FAF8;       /* ikincil kart */
  --surface:#F2F5F1;      /* input idle - hafif yeşilimsi */
  --surface-2:#EEF3EE;    /* modal içi */

  /* — çizgiler — */
  --line:#E5EBE5;
  --line-2:#D2DFD4;
  --line-strong:#B8CABA;

  /* — metin — */
  --ink:#1E2A20;          /* koyu yeşilimsi siyah */
  --ink-2:#3D4F40;
  --ink-3:#6B7B6E;
  --ink-4:#9AAA9C;

  /* — MARKA — sage premium yeşil — */
  --brand:#3D5A3C;        /* ana nude yeşil */
  --brand-2:#2A4029;      /* derin nude yeşil vurgu */
  --brand-3:#536F4F;      /* orta açık sage ton */
  --brand-soft:#EAF0E7;   /* soft nude yeşil arka plan */
  --brand-softer:#F4F7F2; /* en soft */
  --brand-bd:#C9D4BF;     /* soft border */
  --nude:#C8B8A0;         /* nude/şampanya — premium aksan */
  --nude-deep:#9C8B6F;    /* nude koyu */
  --nude-soft:#F1ECE3;    /* nude soft arka plan */
  --nude-glow:#D9C8B0;    /* nude parıltı */

  --accent:#C5B795;       /* nude şampanya tonu (sage ile uyumlu) */
  --accent-2:#A89B7C;
  --accent-soft:#F5F0E5;

  /* — semantik — */
  --ok:#3F5F42; --ok-bg:#EBF1EC; --ok-bd:#C7D5C9;
  --warn:#A57A1E; --warn-bg:#FAF1D9; --warn-bd:#E5CB92;
  --err:#A33A3A; --err-bg:#FBEAEA; --err-bd:#E5C0C0;
  --info:#3D6FA8; --info-bg:#EAF0F7; --info-bd:#BECCDD;

  /* — transfer tipi pasteller — sage aile ile uyumlu — */
  --t-arrival-bg:#EAF1EC;   --t-arrival-bd:#C7D8CB;
  --t-departure-bg:#ECEEF0; --t-departure-bd:#C8CFD4;
  --t-tour-bg:#F5EFD9;      --t-tour-bd:#D9C892;
  --t-intercity-bg:#EFEAE0; --t-intercity-bd:#CFB99F;

  /* — radius — */
  --r-xs:6px; --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:22px; --r-2xl:28px;

  /* — tipografi — */
  --sans:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;

  /* — safe-area — */
  --sa-t:env(safe-area-inset-top,0px);
  --sa-b:env(safe-area-inset-bottom,0px);
  --sa-l:env(safe-area-inset-left,0px);
  --sa-r:env(safe-area-inset-right,0px);

  /* — alt tab yüksekliği — */
  --tabbar-h:74px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;overflow:hidden;
  background:linear-gradient(180deg,#FAFBF9 0%,#F2F5F1 100%);
  background-attachment:fixed;
  font-family:var(--sans);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  font-feature-settings:'ss01' on,'cv11' on;
  text-rendering:optimizeLegibility;
}
#root{
  height:100%;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}

/* — form kontrolleri — */
input,select,textarea{
  font-size:16px!important; /* iOS zoom engelleme */
  -webkit-appearance:none;appearance:none;
  font-family:inherit;outline:none;
  color:var(--ink);
}
button{
  -webkit-appearance:none;appearance:none;
  font-family:inherit;cursor:pointer;
  transition:transform .14s ease,box-shadow .18s ease,background .18s ease,border-color .15s ease,opacity .12s ease;
  touch-action:manipulation;
}
button:active{transform:scale(.972);opacity:.92}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:0;height:0;display:none}

/* — safe-area helper — */
.st{padding-top:var(--sa-t)}
.sb{padding-bottom:calc(var(--sa-b) + 4px)}

/* ═══════════════════════════════════════════════════════════════
   CARD / SURFACE
   ═══════════════════════════════════════════════════════════════ */
.card{
  background:var(--card);
  border-radius:var(--r-lg);
  border:1px solid var(--line);
  box-shadow:0 1px 2px rgba(26,26,26,.03),0 2px 6px rgba(26,26,26,.04);
  padding:16px;
}

/* ═══════════════════════════════════════════════════════════════
   INPUTS / LABELS
   ═══════════════════════════════════════════════════════════════ */
.inp{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--r-sm);
  padding:12px 14px;
  color:var(--ink);
  width:100%;display:block;
  transition:border-color .15s,box-shadow .15s,background .15s;
  font-weight:500;
  min-height:46px;
  line-height:1.25;
}
.inp:focus{
  border-color:var(--brand);
  background:var(--card);
  box-shadow:0 0 0 3px rgba(61,90,60,.14);
}
.inp::placeholder{color:var(--ink-4);font-weight:500}

select.inp,select{
  background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6'%3e%3cpath d='M1 1l4 4 4-4' stroke='%237A746B' stroke-width='1.5' fill='none' stroke-linecap='round'/%3e%3c/svg%3e");
  background-repeat:no-repeat;background-position:right 12px center;background-size:10px;
  padding-right:34px;
}

.lbl{
  font-size:10.5px;font-weight:700;
  color:var(--ink-3);
  letter-spacing:.7px;text-transform:uppercase;
  display:block;margin-bottom:6px;
}

/* ═══════════════════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════════════════ */
.mo{
  position:fixed;inset:0;
  background:rgba(20,19,18,.56);
  z-index:50;
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  animation:moFade .22s ease-out;
}
.ms{
  width:100%;max-width:560px;
  background:var(--card);
  border-radius:var(--r-2xl) var(--r-2xl) 0 0;
  padding:22px 22px calc(22px + var(--sa-b));
  max-height:92vh;overflow-y:auto;
  box-shadow:0 -8px 40px rgba(20,19,18,.22);
  animation:moSlide .3s cubic-bezier(.22,.9,.3,1);
}
@keyframes moFade{from{opacity:0}to{opacity:1}}
@keyframes moSlide{from{transform:translateY(24px);opacity:.4}to{transform:translateY(0);opacity:1}}

/* ═══════════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════════ */
.toast{
  position:fixed;
  top:calc(var(--sa-t) + 16px);left:50%;
  transform:translateX(-50%);
  background:linear-gradient(135deg,#2A1F1C 0%,#1F1715 100%);
  color:#fff;
  padding:11px 24px;
  border-radius:40px;
  font-size:13px;font-weight:600;
  z-index:999;pointer-events:none;white-space:nowrap;
  box-shadow:0 12px 32px rgba(31,23,21,.32),0 0 0 1px rgba(255,255,255,.06) inset;
  letter-spacing:.1px;
  border:1px solid rgba(255,255,255,.1);
  animation:tShow .25s ease-out;
}
@keyframes tShow{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ═══════════════════════════════════════════════════════════════
   HEADER — üst şerit
   ═══════════════════════════════════════════════════════════════ */
.hdr{
  background:linear-gradient(180deg,#FFFFFF 0%,#FDFAF7 100%);
  border-bottom:1px solid var(--line);
  padding-top:var(--sa-t);
  position:sticky;top:0;z-index:30;
  backdrop-filter:saturate(1.3);
  -webkit-backdrop-filter:saturate(1.3);
}
.hdr-inner{
  padding:12px 16px 14px;
  max-width:560px;margin:0 auto;
  display:flex;align-items:center;gap:12px;
}
.avatar-ring{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#3D5A3C 0%,#536F4F 56%,#B8A78D 120%);
  padding:2.5px;
  box-shadow:0 4px 14px rgba(61,90,60,.24),0 1px 3px rgba(61,90,60,.16);
  flex-shrink:0;position:relative;
}
.avatar-inner{
  width:100%;height:100%;border-radius:50%;
  background:#FFFFFF;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:17px;color:var(--brand);
  letter-spacing:-.3px;
}
.hdr-status{
  position:absolute;right:-3px;bottom:-3px;
  width:16px;height:16px;border-radius:50%;
  border:2.5px solid #FFFFFF;z-index:2;
  box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.hdr-status-on{background:#2D7A4A}
.hdr-status-off{background:#536F4F}
.hdr-iconbtn{
  width:42px;height:42px;border-radius:14px;
  background:var(--card);
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);
  flex-shrink:0;
  box-shadow:0 1px 3px rgba(31,23,21,.04);
  transition:all .18s ease;
}
.hdr-iconbtn:active{background:var(--surface);transform:scale(.94)}

/* ═══════════════════════════════════════════════════════════════
   HIZLI ERİŞİM KARTLARI (Ana sayfadaki yuvarlak kartlar)
   ═══════════════════════════════════════════════════════════════ */
.qa-scroll{
  overflow-x:auto;overflow-y:hidden;
  margin:0 -16px;padding:6px 16px 14px;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
}
.qa-scroll::-webkit-scrollbar{display:none}
.qa-row{display:flex;gap:14px;padding-bottom:2px}
.qa-item{
  flex-shrink:0;
  width:78px;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  scroll-snap-align:start;
  background:none;border:none;padding:0;
}
.qa-circle{
  width:68px;height:68px;border-radius:50%;
  background:#FFFFFF;
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:27px;
  box-shadow:0 3px 10px rgba(31,23,21,.06),inset 0 1px 0 rgba(255,255,255,.8);
  position:relative;
  transition:transform .16s ease,box-shadow .2s ease;
}
.qa-item:active .qa-circle{transform:scale(.93)}
.qa-circle-red{
  background:linear-gradient(135deg,#3D5A3C 0%,#2A4029 100%);
  border-color:#2A4029;
  color:#fff;
  box-shadow:0 6px 18px rgba(61,90,60,.30),inset 0 1px 0 rgba(255,255,255,.18);
}
.qa-circle-red-soft{
  background:linear-gradient(135deg,#EAF1EC 0%,#D5E5D8 100%);
  border-color:var(--brand-bd);
  color:var(--brand);
}
.qa-circle-nude{
  background:linear-gradient(135deg,#F7ECDF 0%,#E9D4BA 100%);
  border-color:#D9BFA0;
  color:#7A5530;
}
.qa-circle-dark{
  background:linear-gradient(135deg,#2A1F1C 0%,#1F1715 100%);
  border-color:#1F1715;
  color:#fff;
  box-shadow:0 4px 14px rgba(31,23,21,.30),inset 0 1px 0 rgba(255,255,255,.08);
}
.qa-circle-vehicle{
  background:linear-gradient(135deg,#F2ECE7 0%,#E5DBD1 100%);
  border-color:var(--line-2);
  color:var(--ink-2);
}
.qa-badge{
  position:absolute;top:-2px;right:-2px;
  min-width:20px;height:20px;padding:0 6px;
  background:var(--brand);color:#fff;
  border-radius:10px;border:2px solid #FFFFFF;
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  line-height:1;
  box-shadow:0 2px 6px rgba(61,90,60,.28);
}
.qa-label{
  font-size:11.5px;font-weight:600;color:var(--ink-2);
  text-align:center;line-height:1.2;
  max-width:78px;letter-spacing:-.1px;
}

/* ═══════════════════════════════════════════════════════════════
   HERO CARDS (ana ekran premium özet kartlar)
   ═══════════════════════════════════════════════════════════════ */
.hero-scroll{
  overflow-x:auto;display:flex;gap:14px;
  margin:0 -16px;padding:6px 16px 16px;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}
.hero-scroll::-webkit-scrollbar{display:none}
.hero-card{
  flex-shrink:0;
  width:280px;min-height:160px;
  border-radius:var(--r-lg);
  padding:18px 20px;
  scroll-snap-align:start;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:space-between;
  box-shadow:0 4px 20px rgba(31,23,21,.08),0 1px 3px rgba(31,23,21,.04);
  border:1px solid transparent;
  transition:transform .15s ease,box-shadow .22s ease;
  cursor:pointer;
}
.hero-card:active{transform:scale(.985)}
.hero-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.18) 0%,transparent 70%);
  pointer-events:none;
}
.hero-card-red{
  background:linear-gradient(135deg,#3D5A3C 0%,#2A4029 62%,#9C8B6F 125%);
  color:#fff;
}
.hero-card-nude{
  background:linear-gradient(135deg,#F9EFE6 0%,#F0DFCE 100%);
  color:#5B3D24;
  border-color:#E5CFB9;
}
.hero-card-ivory{
  background:linear-gradient(135deg,#FFFFFF 0%,#FBF6F1 100%);
  color:var(--ink);
  border-color:var(--line);
}
.hero-card-softred{
  background:linear-gradient(135deg,#EAF0E7 0%,#EFEAE0 100%);
  color:#2A4029;
  border-color:var(--brand-bd);
}
.hero-label{
  font-size:10.5px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;opacity:.8;
  display:flex;align-items:center;gap:6px;
}
.hero-value{
  font-size:26px;font-weight:800;letter-spacing:-.6px;
  font-variant-numeric:tabular-nums;margin-top:6px;
  line-height:1.1;
}
.hero-hint{
  font-size:12px;font-weight:500;opacity:.75;margin-top:6px;
  line-height:1.35;
}
.hero-action{
  font-size:11px;font-weight:700;opacity:.85;
  display:inline-flex;align-items:center;gap:4px;
  margin-top:8px;
}

/* ═══════════════════════════════════════════════════════════════
   BÖLÜM BAŞLIĞI
   ═══════════════════════════════════════════════════════════════ */
.section-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 2px 8px;
}
.section-hd-title{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
.section-hd-action{
  font-size:12px;font-weight:700;color:var(--brand);
  letter-spacing:.2px;background:none;border:none;
  display:inline-flex;align-items:center;gap:3px;
}

/* ═══════════════════════════════════════════════════════════════
   TRANSFER CARD — sade, premium, işlevsel
   ═══════════════════════════════════════════════════════════════ */
.tcard{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--r-md);
  margin-bottom:10px;
  overflow:hidden;
  box-shadow:0 1px 3px rgba(31,23,21,.04);
  transition:box-shadow .2s ease,border-color .18s ease,transform .12s ease;
  position:relative;
}
.tcard.is-open{
  box-shadow:0 8px 28px rgba(31,23,21,.10);
  border-color:var(--brand-bd);
}
.tcard-header{
  display:flex;align-items:stretch;cursor:pointer;
  min-height:94px;
}
.tcard-stripe{
  width:4px;flex-shrink:0;
  background:var(--line-strong);
}
.tcard.t-arrival .tcard-stripe{background:linear-gradient(180deg,#536F4F,#2A4029)}
.tcard.t-departure .tcard-stripe{background:linear-gradient(180deg,#C4BCB0,#A89E90)}
.tcard.t-tour .tcard-stripe{background:linear-gradient(180deg,#B8A78D,#9C8B6F)}
.tcard.t-intercity .tcard-stripe{background:linear-gradient(180deg,#C4A880,#9E8460)}
.tcard-body{flex:1;min-width:0;padding:13px 14px;display:flex;gap:11px;align-items:stretch}
.tcard-time{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding-right:11px;
  border-right:1px dashed var(--line);
  min-width:58px;
}
.tcard-time-big{
  font-size:17px;font-weight:800;color:var(--ink);
  font-variant-numeric:tabular-nums;letter-spacing:-.3px;
}
.tcard-time-type{
  font-size:17px;margin-top:4px;
  line-height:1;
}
.tcard-main{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;gap:4px}
.tcard-pills{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-bottom:2px}
.tcard-pill{
  font-size:10px;font-weight:700;
  padding:2.5px 8px;border-radius:6px;
  letter-spacing:.3px;white-space:nowrap;line-height:1.4;
}
.tcard-pill-status-tam{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
.tcard-pill-status-iptal{background:var(--err-bg);color:var(--err);border:1px solid var(--err-bd)}
.tcard-pill-status-bos{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)}
.tcard-pill-flight{background:var(--info-bg);color:var(--info);border:1px solid var(--info-bd)}
.tcard-pill-neutral{background:var(--surface);color:var(--ink-3);border:1px solid var(--line)}
.tcard-pill-alt{background:var(--accent-soft);color:#8A5F2A;border:1px solid #E0C9A8}
.tcard-agency{
  font-size:13px;font-weight:700;color:var(--ink);
  line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tcard-agency .arrow{color:var(--ink-4);margin:0 6px;font-weight:500}
.tcard-route{
  font-size:12px;font-weight:600;color:var(--ink-2);
  line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tcard-route .arrow{color:var(--ink-4);margin:0 4px}
.tcard-passenger{
  font-size:11px;color:var(--ink-3);font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tcard-right{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;
  text-align:right;
  padding-left:8px;
}
.tcard-amount{
  font-size:16px;font-weight:800;
  color:var(--brand);
  font-variant-numeric:tabular-nums;
  line-height:1.15;letter-spacing:-.3px;
  white-space:nowrap;
}
.tcard-amount.is-none{color:var(--ink-4);font-weight:700;font-size:12px}
.tcard-amount-sub{
  font-size:10px;color:var(--ink-3);font-weight:600;
  letter-spacing:.2px;margin-top:1px;
}
.tcard-paystatus{
  font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:6px;
  letter-spacing:.2px;white-space:nowrap;
  display:inline-flex;align-items:center;gap:3px;
  margin-top:5px;
}
.tcard-paystatus.is-paid{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
.tcard-paystatus.is-pending{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)}

.tcard-expanded{
  border-top:1px solid var(--line);
  background:linear-gradient(180deg,#FDFAF7 0%,#FFFFFF 100%);
  padding:14px;
}

/* ═══════════════════════════════════════════════════════════════
   DATE HEADER — günü başlatan bar
   ═══════════════════════════════════════════════════════════════ */
.date-hdr{
  background:linear-gradient(135deg,#3D5A3C 0%,#2A4029 62%,#9C8B6F 125%);
  border:none;
  border-radius:var(--r-sm);
  padding:12px 18px;
  margin:18px 0 10px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 6px 18px rgba(61,90,60,.22),inset 0 1px 0 rgba(255,255,255,.12);
  position:relative;overflow:hidden;
}
.date-hdr::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,#EAF0E7 0%,#536F4F 50%,#3D5A3C 100%);
  box-shadow:0 0 12px rgba(255,255,255,.3);
}
.date-hdr::after{
  content:'';position:absolute;top:-20px;right:-20px;
  width:100px;height:100px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.12) 0%,transparent 70%);
  pointer-events:none;
}
.date-hdr-txt{
  font-size:12.5px;font-weight:700;color:#FFFFFF;
  letter-spacing:1px;text-transform:uppercase;
  text-shadow:0 1px 2px rgba(0,0,0,.22);
  position:relative;
}
.date-hdr-meta{
  font-size:10px;color:rgba(255,255,255,.82);
  font-weight:600;letter-spacing:.3px;text-transform:uppercase;
  position:relative;
}

.bugun-inline{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--card);color:var(--brand);
  border:1px solid var(--brand-bd);
  border-radius:20px;padding:7px 15px;
  font-size:11px;font-weight:700;letter-spacing:.3px;
  margin:0 0 10px;
  box-shadow:0 2px 6px rgba(61,90,60,.12);
}
.bugun-inline:active{background:var(--brand-softer)}

/* ═══════════════════════════════════════════════════════════════
   ALT TAB BAR — sabit, premium
   ═══════════════════════════════════════════════════════════════ */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;
  padding-bottom:var(--sa-b);
  background:rgba(255,255,255,.95);
  backdrop-filter:saturate(1.6) blur(20px);
  -webkit-backdrop-filter:saturate(1.6) blur(20px);
  border-top:1px solid var(--line);
  z-index:40;
  box-shadow:0 -6px 24px rgba(31,23,21,.06);
}
.tabbar-inner{
  display:flex;align-items:stretch;
  max-width:560px;margin:0 auto;
  height:var(--tabbar-h);
  padding:0 4px;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:none;border:none;
  color:var(--ink-3);font-weight:600;
  font-size:10.5px;letter-spacing:.15px;
  padding:8px 2px;border-radius:var(--r-md);
  position:relative;min-height:56px;
  transition:color .15s ease;
}
.tab-icon{font-size:23px;line-height:1;transition:transform .18s ease}
.tab.is-active{color:var(--brand)}
.tab.is-active .tab-label{font-weight:800}
.tab.is-active .tab-icon{transform:scale(1.1)}
.tab.is-active::before{
  content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);
  width:30px;height:3px;border-radius:2px;
  background:linear-gradient(90deg,#3D5A3C 0%,#536F4F 100%);
  box-shadow:0 1px 4px rgba(61,90,60,.30);
}
.tab-fab{
  align-self:center;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#536F4F 0%,#3D5A3C 55%,#2A4029 100%);
  color:#fff;font-size:28px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  border:none;margin:0 4px;
  box-shadow:
    0 6px 18px rgba(61,90,60,.42),
    0 2px 6px rgba(61,90,60,.24),
    inset 0 1px 0 rgba(255,255,255,.22),
    0 0 0 5px rgba(255,255,255,.95);
  position:relative;top:-12px;
}
.tab-fab:active{transform:scale(.9)}

/* ═══════════════════════════════════════════════════════════════
   AMOUNT HELPERS
   ═══════════════════════════════════════════════════════════════ */
.amt-pos{color:var(--ok);font-variant-numeric:tabular-nums}
.amt-neg{color:var(--err);font-variant-numeric:tabular-nums}

/* ═══════════════════════════════════════════════════════════════
   LEGACY tr-row, tr-arrival vs. — eski kodlarla uyumluluk
   ═══════════════════════════════════════════════════════════════ */
.tr-row{transition:box-shadow .18s ease,border-color .18s ease,transform .12s ease}
.tr-row:hover{box-shadow:0 4px 18px rgba(26,26,26,.08)}
.tr-arrival{background:linear-gradient(180deg,var(--t-arrival-bg) 0%,#FFFFFF 70%) !important;border-left:3px solid var(--t-arrival-bd) !important}
.tr-departure{background:linear-gradient(180deg,var(--t-departure-bg) 0%,#FFFFFF 70%) !important;border-left:3px solid var(--t-departure-bd) !important}
.tr-tour{background:linear-gradient(180deg,var(--t-tour-bg) 0%,#FFFFFF 70%) !important;border-left:3px solid var(--t-tour-bd) !important}
.tr-intercity{background:linear-gradient(180deg,var(--t-intercity-bg) 0%,#FFFFFF 70%) !important;border-left:3px solid var(--t-intercity-bd) !important}

/* ═══════════════════════════════════════════════════════════════
   MAIN CONTAINER
   ═══════════════════════════════════════════════════════════════ */
main.main-cont{
  padding:12px 16px calc(var(--tabbar-h) + var(--sa-b) + 20px);
  max-width:560px;margin:0 auto;
}

/* Desktop */
@media (min-width:900px){
  html,body{background:linear-gradient(180deg,#FAFBF9 0%,#F2F5F1 100%)}
  main.main-cont{max-width:1200px!important;padding:18px 24px calc(var(--tabbar-h) + 40px)!important}
  .desk-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px}
  .desk-wide{grid-column:1/-1}
  .card{padding:18px}
  .hero-card{width:300px}
}
@media (min-width:1200px){
  main.main-cont{max-width:1320px!important}
  .desk-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
}

/* ═══════════════════════════════════════════════════════════════
   📅 TAKVİM SEKMESİ
   ═══════════════════════════════════════════════════════════════ */
.tk-wrap{
  display:flex;flex-direction:column;gap:14px;padding:0 2px;
  /* Lokal nude yeşil + titanyum palet */
  --tk-green:#3D5A3C;
  --tk-green-deep:#2A4029;
  --tk-green-deepest:#1F2E1E;
  --tk-green-soft:#536F4F;
  --tk-green-pale:#EAF0E7;
  --tk-green-paler:#F4F7F2;
  --tk-ti:#B8A78D;
  --tk-ti-deep:#9C8B6F;
  --tk-ti-glow:#D9C8B0;
  --tk-ti-pale:#E8DBC4;
  --tk-line-green:rgba(61,90,60,0.18);
  --tk-line-gold:rgba(184,167,141,0.28);
}
.tk-card{
  background:linear-gradient(180deg,#FFFFFF 0%,#FAFBF9 100%);
  border:1px solid var(--tk-line-gold);border-radius:18px;
  padding:14px;
  box-shadow:0 1px 2px rgba(0,0,0,.03),0 4px 14px rgba(31,46,30,.04),
    0 0 0 0.5px rgba(184,167,141,0.10);
}
.tk-widget-app{
  width:min(100%,560px);
  height:clamp(560px,calc(100dvh - var(--tabbar-h) - var(--sa-b) - var(--sa-t) - 120px),700px);
  margin:0 auto;
  border-radius:30px;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(ellipse 110% 80% at 0% 0%, rgba(232,219,196,0.55) 0%, transparent 50%),
    radial-gradient(ellipse 100% 70% at 100% 100%, rgba(184,167,141,0.20) 0%, transparent 55%),
    linear-gradient(135deg,#FDFCFA 0%,#F5F1EA 35%,#EFE9DE 100%);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.9) inset,
    0 -1px 0 rgba(184,167,141,0.20) inset,
    0 0 0 0.5px rgba(184,167,141,0.40),
    0 20px 42px -24px rgba(31,46,30,0.46),
    0 8px 18px -12px rgba(31,46,30,0.24);
  display:flex;
  flex-direction:column;
  padding:12px;
  gap:10px;
  isolation:isolate;
}
.tk-widget-app::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(184,167,141,0.10) 0%, transparent 45%);
  pointer-events:none;z-index:1;
}
.tk-widget-app::after{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(135deg,transparent 0,transparent 1px,rgba(184,167,141,0.022) 1px,rgba(184,167,141,0.022) 2px);
  pointer-events:none;z-index:1;opacity:.65;
}
.tk-widget-cal{
  position:relative;z-index:2;flex-shrink:0;
  background:
    radial-gradient(ellipse at 80% 0%, rgba(217,200,176,0.14) 0%, transparent 55%),
    linear-gradient(160deg,var(--tk-green) 0%,var(--tk-green-deep) 60%,var(--tk-green-deepest) 100%);
  border-radius:13px;
  padding:10px 13px 9px;
  overflow:hidden;
  box-shadow:
    0 1px 0 rgba(217,200,176,0.20) inset,
    0 -1px 0 rgba(0,0,0,0.30) inset,
    0 0 0 0.5px rgba(0,0,0,0.30),
    0 4px 12px rgba(31,46,30,0.30),
    0 1px 3px rgba(31,46,30,0.20);
}
.tk-widget-cal::before{
  content:'';position:absolute;top:-30px;right:-30px;
  width:90px;height:90px;
  background:radial-gradient(circle,var(--tk-ti-glow),transparent 70%);
  opacity:.13;pointer-events:none;
}
.tk-widget-cal-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:7px;position:relative;z-index:1;
}
.tk-widget-brand{
  display:flex;align-items:center;gap:6px;
  font-size:9px;font-weight:900;color:var(--tk-ti-glow);
  letter-spacing:2.6px;text-transform:uppercase;
}
.tk-widget-brand-dot{
  width:5px;height:5px;border-radius:50%;background:var(--tk-ti-glow);
  box-shadow:0 0 5px rgba(217,200,176,.6);
}
.tk-widget-cal-nav{display:flex;align-items:center;gap:4px}
.tk-widget-month{
  min-width:84px;text-align:center;
  font-size:13px;font-weight:900;color:#F4EAD7;letter-spacing:.2px;
}
.tk-widget-month em{font-style:normal;color:var(--tk-ti-glow);font-weight:700;margin-left:4px}
.tk-widget-nav-btn{
  width:24px;height:24px;border-radius:8px;
  border:.5px solid rgba(217,200,176,.28);
  background:rgba(255,255,255,.08);
  color:#F4EAD7;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900;line-height:1;
  cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
}
.tk-widget-nav-btn:active{background:rgba(217,200,176,.18);transform:scale(.94)}
.tk-widget-weekdays{
  display:grid;grid-template-columns:repeat(7,1fr);
  margin-bottom:3px;padding-bottom:4px;
  border-bottom:.5px solid rgba(217,200,176,.22);
  position:relative;z-index:1;
}
.tk-widget-weekday{
  text-align:center;font-size:9px;font-weight:900;
  color:rgba(244,234,215,.55);letter-spacing:.8px;
}
.tk-widget-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:2px;
  position:relative;z-index:1;
}
.tk-widget-day{
  height:24px;
  display:flex;align-items:center;justify-content:flex-start;flex-direction:column;gap:2px;
  padding-top:2px;
  font-size:11px;font-weight:700;color:#F4EAD7;
  border-radius:3px;position:relative;
  font-variant-numeric:tabular-nums;letter-spacing:-.3px;
  cursor:pointer;
}
.tk-widget-day-num{display:block;line-height:1}
.tk-widget-day.tk-other{color:rgba(244,234,215,.26);font-weight:500}
.tk-widget-day.tk-today{
  background:radial-gradient(ellipse at top,rgba(217,200,176,.32) 0%,transparent 60%),rgba(184,167,141,.36);
  color:#fff;font-weight:900;
  box-shadow:inset 0 0 0 1px rgba(217,200,176,.50),0 1px 3px rgba(0,0,0,.20);
}
.tk-widget-day.tk-selected{outline:1px solid rgba(244,234,215,.62);outline-offset:-1px}
.tk-widget-dot{
  display:block;width:4px;height:4px;border-radius:50%;
  background:var(--tk-ti-glow);box-shadow:0 0 3px rgba(217,200,176,.55);
  flex-shrink:0;
}
.tk-widget-day.tk-today .tk-widget-dot{background:#fff;box-shadow:0 0 4px rgba(255,255,255,.7)}
.tk-widget-bot{
  flex:1;display:grid;grid-template-columns:60% 40%;gap:10px;
  position:relative;z-index:2;min-height:0;
}
.tk-widget-pane{
  background:rgba(255,253,249,.78);
  border-radius:13px;
  border:1px solid rgba(31,46,30,.14);
  box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 1px 2px rgba(31,46,30,.04),0 0 0 .5px rgba(184,167,141,.16);
  padding:10px 12px;
  display:flex;flex-direction:column;
  min-height:0;overflow:hidden;
}
.tk-widget-daygrp{display:flex;flex-direction:column;flex:1 1 0;min-height:0;overflow:hidden}
.tk-widget-daygrp + .tk-widget-daygrp{margin-top:8px;padding-top:8px;border-top:1px solid rgba(184,167,141,.24)}
.tk-widget-rowhead{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-shrink:0}
.tk-widget-pill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:9px;font-weight:900;color:var(--tk-green-deep);
  letter-spacing:1px;text-transform:uppercase;
  background:linear-gradient(180deg,rgba(61,90,60,.10),rgba(61,90,60,.06));
  padding:2.5px 7px 2.5px 6px;border-radius:9px;
  border:.5px solid var(--tk-line-green);
}
.tk-widget-pill::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--tk-green);box-shadow:0 0 0 1.5px rgba(61,90,60,.20)}
.tk-widget-pill.tomorrow{color:var(--tk-ti-deep);background:linear-gradient(180deg,rgba(184,167,141,.16),rgba(184,167,141,.10));border-color:var(--tk-line-gold)}
.tk-widget-pill.tomorrow::before{background:var(--tk-ti-deep);box-shadow:0 0 0 1.5px rgba(156,139,111,.20)}
.tk-widget-date{font-size:9.5px;font-weight:800;color:var(--ink-3);white-space:nowrap}
.tk-widget-bar{flex:1;height:1px;background:linear-gradient(90deg,var(--tk-line-green) 0%,transparent 100%)}
.tk-widget-list{display:flex;flex-direction:column;min-height:0;overflow:hidden}
.tk-widget-list.dense .tk-widget-task{padding:3px 0}
.tk-widget-list.dense .tk-widget-sub{display:none}
.tk-widget-task{
  display:flex;align-items:flex-start;gap:6px;
  padding:4px 0;min-width:0;flex-shrink:0;
  cursor:pointer;
}
.tk-widget-task:not(:last-child){border-bottom:.5px solid rgba(184,167,141,.16)}
.tk-widget-check{
  width:14px;height:14px;border-radius:4px;
  border:1.2px solid var(--tk-green-soft);
  background:rgba(255,255,255,.72);
  flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
}
.tk-widget-task.done .tk-widget-check{
  background:linear-gradient(135deg,var(--tk-green) 0%,var(--tk-green-deep) 100%);
  border-color:var(--tk-green-deep);
}
.tk-widget-task.done .tk-widget-check::after{content:'✓';color:var(--tk-ti-glow);font-size:8px;font-weight:900;line-height:1}
.tk-widget-task.transfer .tk-widget-check{
  width:7px;height:7px;border-radius:50%;border:none;
  background:var(--tk-ti-deep);box-shadow:0 0 0 3px rgba(156,139,111,.14);
  margin-top:6px;
}
.tk-widget-task.transfer.done .tk-widget-check{background:var(--tk-ti-deep);border:none}
.tk-widget-taskbody{flex:1;min-width:0;display:flex;flex-direction:column}
.tk-widget-line{
  display:flex;align-items:flex-start;gap:5px;min-width:0;overflow:hidden;
  font-size:12px;color:var(--ink);font-weight:800;line-height:1.25;
}
.tk-widget-time{font-size:10.5px;color:var(--tk-green-deep);font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.2px;flex-shrink:0;line-height:1.25;padding-top:1px}
.tk-widget-task.transfer .tk-widget-time{color:var(--tk-ti-deep)}
.tk-widget-title{
  flex:1;min-width:0;display:block;
  white-space:nowrap;overflow:hidden;text-overflow:clip;
}
.tk-widget-sub{
  font-size:10px;color:var(--ink-3);font-weight:650;line-height:1.22;margin-top:1px;
  display:block;white-space:nowrap;overflow:hidden;text-overflow:clip;
}
.tk-widget-task.done .tk-widget-line,.tk-widget-task.done .tk-widget-sub{text-decoration:line-through;color:var(--ink-4);font-weight:600}
.tk-widget-task.transfer.done .tk-widget-line,.tk-widget-task.transfer.done .tk-widget-sub{text-decoration:none;color:var(--ink);font-weight:800}
.tk-widget-task.transfer.done .tk-widget-time{color:var(--tk-ti-deep)}
.tk-widget-task.transfer .tk-widget-sub{display:none}
.tk-widget-empty{font-size:10px;color:var(--ink-4);font-style:italic;padding:4px 2px;font-weight:600}
.tk-widget-lgsec{display:flex;flex-direction:column;flex:1;min-height:0}
.tk-widget-lgsec + .tk-widget-lgsec{margin-top:8px}
.tk-widget-ledger-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-shrink:0}
.tk-widget-ledger-pill{
  display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:900;letter-spacing:1px;text-transform:uppercase;
  padding:2.5px 7px 2.5px 6px;border-radius:9px;
}
.tk-widget-ledger-pill.in{color:#2A4029;background:linear-gradient(180deg,rgba(61,90,60,.10),rgba(61,90,60,.06));border:.5px solid rgba(61,90,60,.20)}
.tk-widget-ledger-pill.out{color:#7A4538;background:linear-gradient(180deg,rgba(156,92,76,.10),rgba(156,92,76,.06));border:.5px solid rgba(156,92,76,.20)}
.tk-widget-ledger-pill::before{content:'';width:4px;height:4px;border-radius:50%}
.tk-widget-ledger-pill.in::before{background:#3D5A3C;box-shadow:0 0 0 1.5px rgba(61,90,60,.20)}
.tk-widget-ledger-pill.out::before{background:#9C5C4C;box-shadow:0 0 0 1.5px rgba(156,92,76,.20)}
.tk-widget-total{font-size:9.5px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.15px;max-width:68px;white-space:nowrap;overflow:hidden}
.tk-widget-total.in{color:#2A4029}.tk-widget-total.out{color:#7A4538}
.tk-widget-ledger-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:.5px dotted rgba(184,167,141,.30);cursor:pointer;min-width:0}
.tk-widget-ledger-row:last-child{border-bottom:none}
.tk-widget-ledger-check{width:14px;height:14px;border-radius:4px;border:1.2px solid var(--tk-green-soft);background:rgba(255,255,255,.72);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.tk-widget-ledger-row.settled.in .tk-widget-ledger-check{background:linear-gradient(135deg,#3D5A3C,#2A4029);border-color:#2A4029}
.tk-widget-ledger-row.settled.out .tk-widget-ledger-check{background:linear-gradient(135deg,#9C5C4C,#7A4538);border-color:#7A4538}
.tk-widget-ledger-row.settled .tk-widget-ledger-check::after{content:'✓';color:#fff;font-size:7.5px;font-weight:900;line-height:1}
.tk-widget-ledger-name{flex:1;min-width:0;font-size:12px;font-weight:800;color:var(--ink);line-height:1.22;white-space:nowrap;overflow:hidden;text-overflow:clip}
.tk-widget-ledger-amt{font-size:10.5px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.2px;white-space:nowrap;flex-shrink:0;max-width:72px;overflow:hidden}
.tk-widget-ledger-amt.in{color:#2A4029}.tk-widget-ledger-amt.out{color:#7A4538}
.tk-widget-ledger-row.settled .tk-widget-ledger-name,.tk-widget-ledger-row.settled .tk-widget-ledger-amt{text-decoration:line-through;color:var(--ink-4);font-weight:600}
.tk-widget-actions{width:min(100%,560px);margin:12px auto 0;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tk-widget-action{
  border:1px solid var(--tk-line-gold);background:linear-gradient(180deg,#FFFFFF,#FAFBF9);
  color:var(--tk-green-deep);border-radius:12px;padding:10px 12px;font-size:12px;font-weight:900;
  box-shadow:0 1px 2px rgba(31,46,30,.04);cursor:pointer;
}
@media (min-width:900px){
  .tk-widget-app{
    width:min(100%,860px);
    height:clamp(620px,calc(100dvh - var(--tabbar-h) - 110px),760px);
    padding:14px;
    gap:12px;
  }
  .tk-widget-actions{width:min(100%,860px)}
  .tk-widget-cal{padding:12px 16px 11px}
  .tk-widget-day{height:30px;font-size:12px;padding-top:4px}
  .tk-widget-dot{width:4px;height:4px}
  .tk-widget-brand{font-size:10px}
  .tk-widget-month{font-size:14px;min-width:96px}
  .tk-widget-pane{padding:12px 14px}
  .tk-widget-line{font-size:13px}
  .tk-widget-time{font-size:11px}
  .tk-widget-sub{font-size:10.5px}
  .tk-widget-ledger-name{font-size:13px}
  .tk-widget-ledger-amt{font-size:11.5px;max-width:90px}
}
.tk-month-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line);
}
.tk-month-title{font-weight:900;font-size:18px;color:var(--ink);letter-spacing:-.3px}
.tk-month-title em{font-style:normal;color:var(--tk-ti-deep);font-weight:700;margin-left:6px}
.tk-nav-btn{
  background:var(--surface);border:1px solid var(--line);border-radius:10px;
  width:34px;height:34px;color:var(--ink);font-size:18px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.tk-nav-btn:active{background:var(--tk-green-pale)}
.tk-weekdays{
  display:grid;grid-template-columns:repeat(7,1fr);gap:2px;
  margin-bottom:4px;
}
.tk-weekday{
  text-align:center;font-size:10px;font-weight:800;
  color:var(--ink-3);letter-spacing:.6px;text-transform:uppercase;
  padding:4px 0;
}
.tk-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:3px;
}
.tk-cell{
  aspect-ratio:1;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:10px;
  padding:6px 4px 4px;
  position:relative;
  cursor:pointer;
  transition:all .15s;
  display:flex;flex-direction:column;align-items:center;
  min-height:46px;
}
.tk-cell.tk-other{opacity:.35}
.tk-cell.tk-today{
  background:linear-gradient(180deg,var(--tk-green-pale),var(--tk-green-paler));
  border-color:var(--tk-green);
  box-shadow:0 0 0 2px rgba(61,90,60,.15);
}
.tk-cell.tk-selected{
  background:linear-gradient(180deg,var(--tk-green) 0%,var(--tk-green-deep) 100%);
  border-color:var(--tk-green-deep);
  box-shadow:0 2px 8px rgba(31,46,30,0.20);
}
.tk-cell.tk-selected .tk-cell-num{color:#fff}
.tk-cell-num{
  font-weight:800;font-size:14px;color:var(--ink);
  font-variant-numeric:tabular-nums;line-height:1;
}
.tk-cell-dots{
  display:flex;gap:2px;margin-top:auto;flex-wrap:wrap;justify-content:center;
}
.tk-cell-dot{
  width:5px;height:5px;border-radius:50%;
}
.tk-cell.tk-selected .tk-cell-dot{background:rgba(255,255,255,.85)!important}
.tk-cell-count{
  position:absolute;top:3px;right:4px;
  font-size:9px;font-weight:800;color:var(--tk-green-deep);
  background:rgba(255,255,255,.95);
  border-radius:8px;padding:1px 4px;line-height:1;
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.tk-cell.tk-selected .tk-cell-count{background:rgba(255,255,255,.95);color:var(--tk-green-deep)}

.tk-calendar-card{
  position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse at 82% 0%, rgba(217,200,176,0.16) 0%, transparent 54%),
    linear-gradient(160deg,var(--tk-green) 0%,var(--tk-green-deep) 58%,var(--tk-green-deepest) 100%);
  border-color:rgba(184,167,141,0.34);
  border-radius:18px;
  padding:13px 13px 14px;
  box-shadow:
    0 1px 0 rgba(217,200,176,0.22) inset,
    0 -1px 0 rgba(0,0,0,0.24) inset,
    0 0 0 0.5px rgba(31,46,30,0.35),
    0 10px 24px rgba(31,46,30,0.18);
}
.tk-calendar-card::before{
  content:'';position:absolute;top:-44px;right:-34px;
  width:138px;height:138px;border-radius:50%;
  background:radial-gradient(circle,var(--tk-ti-glow),transparent 70%);
  opacity:.13;pointer-events:none;
}
.tk-calendar-card::after{
  content:'';position:absolute;left:16px;right:16px;bottom:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--tk-ti),transparent);
  opacity:.34;pointer-events:none;
}
.tk-calendar-card .tk-month-head{
  position:relative;z-index:1;
  border-bottom:1px solid rgba(217,200,176,0.22);
  padding-bottom:9px;margin-bottom:7px;
}
.tk-month-center{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}
.tk-calendar-brand{
  display:flex;align-items:center;gap:6px;
  font-size:9px;font-weight:900;color:var(--tk-ti-glow);
  letter-spacing:2.4px;text-transform:uppercase;
}
.tk-calendar-brand-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--tk-ti-glow);
  box-shadow:0 0 6px rgba(217,200,176,.62);
}
.tk-calendar-card .tk-month-title{font-size:17px;color:#F4EAD7;text-align:center}
.tk-calendar-card .tk-month-title em{color:var(--tk-ti-glow)}
.tk-calendar-card .tk-nav-btn{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(217,200,176,.26);
  color:#F4EAD7;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
}
.tk-calendar-card .tk-nav-btn:active{background:rgba(217,200,176,.18)}
.tk-calendar-card .tk-nav-btn:focus{outline:none}
.tk-calendar-card .tk-nav-btn:focus-visible{
  box-shadow:0 0 0 2px rgba(217,200,176,.34),inset 0 1px 0 rgba(255,255,255,.12);
}
.tk-calendar-card .tk-weekdays,
.tk-calendar-card .tk-grid{position:relative;z-index:1}
.tk-calendar-card .tk-weekday{
  color:rgba(244,234,215,.58);
  font-size:9.5px;
}
.tk-calendar-card .tk-cell{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(217,200,176,.12);
  color:#F4EAD7;
  box-shadow:none;
}
.tk-calendar-card .tk-cell-num{color:#F4EAD7}
.tk-calendar-card .tk-cell.tk-other{opacity:1}
.tk-calendar-card .tk-cell.tk-other .tk-cell-num{color:rgba(244,234,215,.30)}
.tk-calendar-card .tk-cell.tk-today{
  background:rgba(184,167,141,.28);
  border-color:rgba(217,200,176,.48);
  box-shadow:inset 0 0 0 1px rgba(217,200,176,.28),0 2px 7px rgba(0,0,0,.12);
}
.tk-calendar-card .tk-cell.tk-selected{
  background:linear-gradient(180deg,rgba(217,200,176,.42),rgba(184,167,141,.26));
  border-color:rgba(244,234,215,.72);
  box-shadow:0 3px 10px rgba(0,0,0,.20),inset 0 0 0 1px rgba(255,255,255,.18);
}
.tk-calendar-card .tk-cell-count{
  color:var(--tk-green-deep);
  background:rgba(244,234,215,.94);
}

.tk-day-section{
  background:linear-gradient(180deg,#FFFFFF 0%,#FAFBF9 100%);
  border:1px solid var(--tk-line-gold);border-radius:18px;
  padding:14px 14px 10px;
  box-shadow:0 1px 2px rgba(0,0,0,.03),0 4px 14px rgba(31,46,30,.04),
    0 0 0 0.5px rgba(184,167,141,0.10);
}
.tk-day-h{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line);
}
.tk-day-title{font-weight:900;font-size:16px;color:var(--ink);letter-spacing:-.2px}
.tk-day-sub{font-size:11px;color:var(--ink-3);font-weight:600;margin-top:2px}
.tk-add-btn{
  background:linear-gradient(135deg,var(--tk-green) 0%,var(--tk-green-deep) 100%);
  color:#fff;border:none;border-radius:10px;
  padding:8px 14px;font-weight:800;font-size:12px;cursor:pointer;
  box-shadow:0 2px 6px rgba(31,46,30,.30),0 0 0 0.5px rgba(184,167,141,0.20);
}
.tk-add-btn:active{transform:scale(.96)}
.tk-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border:1px solid var(--line);
  border-radius:12px;background:var(--card);
  margin-bottom:8px;transition:all .15s;
}
.tk-item.tk-done{opacity:.55}
.tk-item.tk-done .tk-item-title{text-decoration:line-through;color:var(--ink-3)}
.tk-item-check{
  width:22px;height:22px;border-radius:7px;
  border:1.8px solid var(--line-strong);
  background:#fff;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:transparent;font-weight:900;
  transition:all .15s;
}
.tk-item-check.tk-checked{
  background:linear-gradient(135deg,var(--tk-green) 0%,var(--tk-green-deep) 100%);
  border-color:var(--tk-green-deep);color:#fff;
}
.tk-item-body{flex:1;min-width:0}
.tk-item-row1{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px;
}
.tk-item-time{
  font-weight:800;font-size:12px;color:var(--tk-green-deep);
  font-variant-numeric:tabular-nums;letter-spacing:-.2px;
  background:var(--tk-green-pale);padding:2px 7px;border-radius:6px;
}
.tk-item-title{
  font-weight:700;font-size:13.5px;color:var(--ink);line-height:1.3;
  word-break:break-word;
}
.tk-item-sub{
  font-size:11.5px;color:var(--ink-3);font-weight:500;
  margin-top:3px;line-height:1.4;
  word-break:break-word;
}
.tk-item-tag{
  display:inline-block;
  font-size:10px;font-weight:800;
  padding:2px 7px;border-radius:6px;
  letter-spacing:.3px;text-transform:uppercase;
  margin-left:4px;
}
.tk-item-tag.tk-tag-transfer{background:#EAF0E7;color:#2A4029;border:1px solid #C9D4BF}
.tk-item-tag.tk-tag-todo{background:#EFEAE0;color:#7A6B4A;border:1px solid #D8C99F}
.tk-item-tag.tk-tag-event{background:#EAF0F7;color:#3D6FA8;border:1px solid #BECCDD}
.tk-item-del{
  background:none;border:none;color:var(--ink-4);
  font-size:18px;cursor:pointer;padding:0 4px;
  flex-shrink:0;
}
.tk-item-del:active{color:var(--err)}
.tk-empty{
  text-align:center;padding:18px 14px;
  font-size:12.5px;color:var(--ink-3);font-weight:600;
  background:var(--surface);border:1px dashed var(--line);
  border-radius:12px;
}

/* Ledger items */
.tk-ledger{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border:1px solid var(--line);
  border-radius:12px;background:var(--card);
  margin-bottom:6px;
}
.tk-ledger.tk-ledger-done{opacity:.5}
.tk-ledger.tk-ledger-done .tk-ledger-name{text-decoration:line-through}
.tk-ledger-check{
  width:22px;height:22px;border-radius:7px;
  border:1.8px solid var(--line-strong);
  background:#fff;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:transparent;font-weight:900;
  transition:all .15s;
}
.tk-ledger-check.tk-checked{
  background:linear-gradient(135deg,var(--ok) 0%,#2D4530 100%);
  border-color:var(--ok);color:#fff;
}
.tk-ledger-body{flex:1;min-width:0}
.tk-ledger-name{font-weight:700;font-size:13px;color:var(--ink);line-height:1.3;word-break:break-word}
.tk-ledger-sub{font-size:11px;color:var(--ink-3);font-weight:500;margin-top:2px}
.tk-ledger-amt{font-weight:900;font-size:14px;font-variant-numeric:tabular-nums;letter-spacing:-.3px;flex-shrink:0;white-space:nowrap}
.tk-ledger-amt.tk-amt-in{color:var(--ok)}
.tk-ledger-amt.tk-amt-out{color:var(--err)}

.tk-section-h{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px solid var(--line);
}
.tk-section-bar{display:inline-block;width:4px;height:16px;border-radius:2px}
.tk-section-bar.tk-bar-in{background:var(--ok)}
.tk-section-bar.tk-bar-out{background:var(--err)}
.tk-section-title{font-weight:900;font-size:13px;letter-spacing:.3px;text-transform:uppercase}
.tk-section-title.tk-tt-in{color:var(--ok)}
.tk-section-title.tk-tt-out{color:var(--err)}
.tk-section-count{
  margin-left:auto;font-size:10.5px;font-weight:800;
  padding:2px 8px;border-radius:9px;
}
.tk-section-count.tk-cn-in{background:#E8F3EB;color:var(--ok);border:1px solid #BFD9C5}
.tk-section-count.tk-cn-out{background:#FBEAEA;color:var(--err);border:1px solid #E5C0C0}

/* Takvim form modal */
.tk-form-grp{margin-bottom:14px}
.tk-form-lbl{
  font-size:10.5px;font-weight:800;color:var(--ink-3);
  letter-spacing:.7px;text-transform:uppercase;
  display:block;margin-bottom:6px;
}
.tk-type-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px;
}
.tk-type-opt{
  background:var(--surface);border:1.5px solid var(--line);
  border-radius:11px;padding:10px 6px;text-align:center;cursor:pointer;
  transition:all .15s;
}
.tk-type-opt.sel{
  background:linear-gradient(135deg,var(--tk-green-pale) 0%,var(--tk-green-paler) 100%);
  border-color:var(--tk-green);box-shadow:0 0 0 2px rgba(61,90,60,.15);
}
.tk-type-opt-icon{font-size:18px;margin-bottom:3px}
.tk-type-opt-lbl{font-size:11px;font-weight:800;color:var(--ink)}
.tk-type-opt.sel .tk-type-opt-lbl{color:var(--tk-green-deep)}



/* SCRIPTABLE/RECURRING LEDGER */
.tk-control-grid{width:min(100%,560px);margin:12px auto 0;display:grid;grid-template-columns:1fr;gap:10px}
.tk-tools-card{
  background:linear-gradient(180deg,#FFFFFF,#FAFBF9);
  border:1px solid rgba(184,167,141,.28);
  border-radius:18px;padding:13px;
  box-shadow:0 1px 2px rgba(31,46,30,.04),0 10px 24px -18px rgba(31,46,30,.28)
}
.tk-tools-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.tk-tools-title{font-size:12px;font-weight:900;color:var(--tk-green-deep);letter-spacing:.8px;text-transform:uppercase}
.tk-tools-sub{font-size:11px;font-weight:700;color:var(--ink-3);line-height:1.35}
.tk-ledger-mini-list{display:grid;grid-template-columns:1fr;gap:8px}
.tk-ledger-mini{
  display:flex;align-items:center;gap:8px;min-width:0;
  padding:9px 10px;border-radius:12px;background:rgba(246,240,235,.72);
  border:1px solid rgba(184,167,141,.22)
}
.tk-ledger-mini-check{
  width:18px;height:18px;border-radius:6px;border:1.4px solid var(--tk-green-soft);
  display:flex;align-items:center;justify-content:center;background:#fff;flex-shrink:0;
  color:#fff;font-size:10px;font-weight:900;cursor:pointer
}
.tk-ledger-mini-check.done{background:linear-gradient(135deg,var(--tk-green),var(--tk-green-deep));border-color:var(--tk-green-deep)}
.tk-ledger-mini-body{flex:1;min-width:0}
.tk-ledger-mini-name{font-size:12px;font-weight:900;color:var(--ink);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:clip}
.tk-ledger-mini-note{font-size:10.5px;color:var(--ink-3);font-weight:650;line-height:1.25;margin-top:2px}
.tk-ledger-mini-amt{font-size:12px;font-weight:950;font-variant-numeric:tabular-nums;white-space:nowrap}
.tk-ledger-mini-amt.in{color:#2A4029}.tk-ledger-mini-amt.out{color:#7A4538}
.tk-ledger-mini-actions{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.tk-mini-btn{border:none;border-radius:999px;padding:6px 8px;font-size:10px;font-weight:900;cursor:pointer;background:#EFE8DE;color:#2A4029}
.tk-mini-btn.pay{background:#EAF0E7;color:#2A4029}.tk-mini-btn.add{background:#F3ECE1;color:#7A6040}
.tk-history-list{display:flex;flex-direction:column;gap:7px;max-height:230px;overflow:auto;padding-right:2px}
.tk-history-row{display:flex;align-items:flex-start;gap:8px;padding:8px 9px;border-radius:11px;background:rgba(246,240,235,.58);border:1px solid rgba(184,167,141,.18)}
.tk-history-dot{width:7px;height:7px;border-radius:50%;background:var(--tk-ti-deep);margin-top:5px;flex-shrink:0}
.tk-history-body{flex:1;min-width:0}
.tk-history-title{font-size:11.5px;font-weight:900;color:var(--ink);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:clip}
.tk-history-sub{font-size:10.5px;font-weight:650;color:var(--ink-3);line-height:1.25;margin-top:2px}
.tk-repeat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:6px}
.tk-repeat-btn{border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:9px 4px;font-size:11px;font-weight:900;color:var(--ink-2);cursor:pointer}
.tk-repeat-btn.sel{background:linear-gradient(135deg,var(--tk-green-pale),var(--tk-green-paler));border-color:var(--tk-green);color:var(--tk-green-deep)}
.tk-form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media (min-width:900px){
  .tk-control-grid{width:min(100%,860px);grid-template-columns:1.2fr .8fr}
  .tk-ledger-mini-list{grid-template-columns:1fr 1fr}
}

/* ═══════════════════════════════════════════════════════════════
   v6 — KATEGORİ SİSTEMİ + DÜZENLEME MODU
   ═══════════════════════════════════════════════════════════════ */

/* Her kategorinin ana rengi & yumuşak tonu */
.tk-wrap{
  --cat-is:#1E5A9C;        --cat-is-soft:#E5EEF7;        --cat-is-bd:#B8CCE0;
  --cat-odeme:#B53A3A;     --cat-odeme-soft:#FBE9E9;     --cat-odeme-bd:#E5BFBF;
  --cat-yapilacak:#3D7A3C; --cat-yapilacak-soft:#E7F1E8; --cat-yapilacak-bd:#BFD5C0;
  --cat-onemli:#C77A1A;    --cat-onemli-soft:#FBEFD9;    --cat-onemli-bd:#E5CB92;
  --cat-not:#7A6B4A;       --cat-not-soft:#EFEAE0;       --cat-not-bd:#D8C99F;
  --cat-etkinlik:#7A4FA0;  --cat-etkinlik-soft:#EEE5F4;  --cat-etkinlik-bd:#CFB9DC;
  --cat-transfer:#1F1715;  --cat-transfer-soft:#EAE8E6;  --cat-transfer-bd:#B8B0A8;
}

/* Kategori seçimi 4'lü grid */
.tk-cat-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px;
}
.tk-cat-opt{
  position:relative;
  background:var(--surface);border:1.5px solid var(--line);
  border-radius:11px;padding:9px 4px 8px;text-align:center;cursor:pointer;
  transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;
  min-height:54px;justify-content:center;
}
.tk-cat-opt::before{
  content:'';position:absolute;left:6px;top:6px;bottom:6px;width:3px;border-radius:2px;
  background:var(--cat-color,var(--ink-3));opacity:.85;
}
.tk-cat-opt-icon{
  width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  background:var(--cat-soft,var(--surface-2));color:var(--cat-color,var(--ink));
  font-size:13px;font-weight:900;
}
.tk-cat-opt-lbl{font-size:10.5px;font-weight:800;color:var(--ink-2);letter-spacing:.2px}
.tk-cat-opt.sel{
  background:var(--cat-soft,var(--surface));
  border-color:var(--cat-color,var(--brand));
  box-shadow:0 0 0 2px color-mix(in srgb,var(--cat-color,var(--brand)) 20%,transparent);
}
.tk-cat-opt.sel .tk-cat-opt-lbl{color:var(--cat-color,var(--ink))}

.tk-cat-is{--cat-color:var(--cat-is);--cat-soft:var(--cat-is-soft)}
.tk-cat-odeme{--cat-color:var(--cat-odeme);--cat-soft:var(--cat-odeme-soft)}
.tk-cat-yapilacak{--cat-color:var(--cat-yapilacak);--cat-soft:var(--cat-yapilacak-soft)}
.tk-cat-onemli{--cat-color:var(--cat-onemli);--cat-soft:var(--cat-onemli-soft)}
.tk-cat-not{--cat-color:var(--cat-not);--cat-soft:var(--cat-not-soft)}
.tk-cat-etkinlik{--cat-color:var(--cat-etkinlik);--cat-soft:var(--cat-etkinlik-soft)}

/* Öncelik 4'lü */
.tk-pri-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px}
.tk-pri-btn{
  border:1px solid var(--line);background:var(--surface);border-radius:10px;
  padding:8px 4px;font-size:11px;font-weight:900;color:var(--ink-2);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.tk-pri-btn-dot{width:8px;height:8px;border-radius:50%;background:var(--ink-4)}
.tk-pri-btn.tk-pri-low.sel    {background:#EAF0E7;border-color:#3D7A3C;color:#2A4029}
.tk-pri-btn.tk-pri-low.sel    .tk-pri-btn-dot{background:#3D7A3C}
.tk-pri-btn.tk-pri-normal.sel {background:#E5EEF7;border-color:#1E5A9C;color:#1E3A5C}
.tk-pri-btn.tk-pri-normal.sel .tk-pri-btn-dot{background:#1E5A9C}
.tk-pri-btn.tk-pri-high.sel   {background:#FBEFD9;border-color:#C77A1A;color:#7A4A0A}
.tk-pri-btn.tk-pri-high.sel   .tk-pri-btn-dot{background:#C77A1A}
.tk-pri-btn.tk-pri-urgent.sel {background:#FBE9E9;border-color:#B53A3A;color:#7A1F1F}
.tk-pri-btn.tk-pri-urgent.sel .tk-pri-btn-dot{background:#B53A3A;box-shadow:0 0 0 3px rgba(181,58,58,.20)}

/* Widget ana liste — kategoriye göre stabil sol şerit (DOM'da ayrı eleman) */
.tk-widget-stripe{
  width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;
  background:var(--row-cat,transparent);
  margin:1px 0;
}
.tk-widget-task.transfer .tk-widget-stripe{display:none}
.tk-widget-task .tk-widget-check{
  border-color:var(--row-cat,var(--tk-green-soft));
}
.tk-widget-task.done .tk-widget-check{
  background:var(--row-cat,linear-gradient(135deg,var(--tk-green) 0%,var(--tk-green-deep) 100%));
  border-color:var(--row-cat,var(--tk-green-deep));
}
.tk-widget-task.transfer .tk-widget-check{
  background:#1F1715;
  box-shadow:0 0 0 3px rgba(31,23,21,.14);
}
.tk-widget-task .tk-widget-time{color:var(--row-cat,var(--tk-green-deep))}
.tk-widget-task.transfer .tk-widget-time{color:#1F1715}

/* row tıklama state */
.tk-widget-task.tk-clickable:active{background:rgba(184,167,141,.10);border-radius:8px}

/* Kategori bilgi sloganı widget altında */
.tk-cat-legend{
  display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
  padding:8px 10px 2px;font-size:10px;font-weight:800;color:var(--ink-3);
}
.tk-cat-legend-item{display:inline-flex;align-items:center;gap:5px;letter-spacing:.3px}
.tk-cat-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* Kategori etiketi (form ek bilgi) */
.tk-form-hint{font-size:11px;color:var(--ink-3);font-weight:600;margin-top:6px;line-height:1.4}

/* Düzenleme/Silme bar bottom modal */
.tk-edit-bar{
  display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;
  margin-top:14px;padding-top:14px;border-top:1px solid var(--line);
}
.tk-edit-del-btn{
  background:#FBEAEA;color:#A33A3A;border:1.5px solid #E5C0C0;border-radius:10px;
  padding:10px 14px;font-weight:900;font-size:12.5px;cursor:pointer;letter-spacing:.3px;
}
.tk-edit-del-btn:active{background:#F5D5D5}

/* Mobil küçük ekran */
@media (max-width:380px){
  .tk-cat-grid{grid-template-columns:repeat(3,1fr)}
  .tk-pri-grid{grid-template-columns:repeat(2,1fr)}
}

</style>

    const [editingLedgerId, setEditingLedgerId] = useState(null);
    const [ledgerForm, setLedgerForm] = useState({ ltype: 'in', person: '', amount: '', note: '', due: '' });

    // Kategori meta — widget renklerinin React tarafı
    const CATEGORIES = [
        { id: 'is',        label: 'İş',        icon: '💼', color: '#1E5A9C' },
        { id: 'odeme',     label: 'Ödemeler',  icon: '₺',  color: '#B53A3A' },
        { id: 'yapilacak', label: 'Yapılacak', icon: '✓',  color: '#3D7A3C' },
        { id: 'onemli',    label: 'Önemli',    icon: '★',  color: '#C77A1A' },
        { id: 'not',       label: 'Not',       icon: '✎',  color: '#7A6B4A' },
        { id: 'etkinlik',  label: 'Etkinlik',  icon: '◷',  color: '#7A4FA0' }
    ];
    const PRIORITIES = [
        { id: 'low',    label: 'Düşük',  cls: 'tk-pri-low' },
        { id: 'normal', label: 'Normal', cls: 'tk-pri-normal' },
        { id: 'high',   label: 'Yüksek', cls: 'tk-pri-high' },
        { id: 'urgent', label: 'Acil',   cls: 'tk-pri-urgent' }
    ];

    // Renk yardımcıları
    const colorOf = (cat) => {
        const c = (CATEGORIES.find(x => x.id === cat) || {}).color;
        return c || '#7A6B4A';
    };
    // Başlık + içerikten otomatik kategori tahmini (sadece kullanıcı seçmediyse)
    const guessCategory = (title, notes) => {
        const t = (String(title || '') + ' ' + String(notes || '')).toLowerCase()
            .replace(/[ıİ]/g,'i').replace(/[ğĞ]/g,'g').replace(/[üÜ]/g,'u')
            .replace(/[şŞ]/g,'s').replace(/[öÖ]/g,'o').replace(/[çÇ]/g,'c');
        if (/odem|fatura|kredi|kira|tahsilat|borc|fis|kart|nakit|havale|eft|elektrik|su\b|dogal\s?gaz|internet/.test(t)) return 'odeme';
        if (/is\b|toplant|musteri|teslim|sozlesm|ofis|firma|brief|sunum|projed|rapor/.test(t)) return 'is';
        if (/onemli|acil|deadline|son tarih|kritik/.test(t)) return 'onemli';
        return 'yapilacak';
    };
    // İtem'den kategori al (eski kayıtlarda category alanı olmayabilir)
    const itemCategory = (it) => {
        if (!it) return 'yapilacak';
        if (it.type === 'transfer') return 'transfer';
        const orig = it.origData || {};
        if (orig.category) return orig.category;
        if (orig.kind === 'event' || it.type === 'event') return 'etkinlik';
        if (orig.kind === 'note' || it.type === 'note') return 'not';
        if (orig.priority === 'high' || orig.priority === 'urgent') return 'onemli';
        return guessCategory(orig.title || it.title || '', orig.notes || '');
    };

    const AYLAR_LONG = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    const GUNLER = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
    const REPEAT_OPTIONS = [
        { id: 'none', label: 'Yok' },
        { id: 'daily', label: 'Günlük' },
        { id: 'weekly', label: 'Haftalık' },
        { id: 'monthly', label: 'Aylık' },
        { id: 'yearly', label: 'Yıllık' }
    ];

    const keyOf = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

    const dayMs = 86400000;
    const today = new Date();
    const todayKey = keyOf(today);
    const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
    const tomorrowKey = keyOf(tomorrow);

    const cells = [];
    for (let i = startWeekday - 1; i >= 0; i--) {
        const d = prevMonthDays - i;
        const dt = new Date(year, month-1, d);
        cells.push({ day: d, date: keyOf(dt), other: true });
    }
    for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, date: year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'), other: false });
    const remain = (7 - cells.length % 7) % 7;
    for (let d = 1; d <= remain; d++) {

        cells.push({ day: d, date: keyOf(dt), other: true });
    }

    const repeatLabel = r => (REPEAT_OPTIONS.find(x => x.id === r) || REPEAT_OPTIONS[0]).label;
    const todoStart = t => t.date || t.eventDate || '';
    const isRepeating = t => t && t.repeat && t.repeat !== 'none';
    const monthsBetween = (start, end) => (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());

        if (!startKey) return false;

        if (t.repeat === 'daily') return diff % interval === 0;

        if (t.repeat === 'monthly') return target.getDate() === start.getDate() && monthsBetween(start, target) % interval === 0;
        if (t.repeat === 'yearly') return target.getDate() === start.getDate() && target.getMonth() === start.getMonth() && ((target.getFullYear() - start.getFullYear()) % interval === 0);

            time: t.time || '',
